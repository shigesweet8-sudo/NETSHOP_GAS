    <script>
      var STAFF_SESSION_KEY = 'netshop.selectedStaff';

      function setStaffMessage(kind, message) {
        setInlineMessageById('staff-add-message', kind, message);
      }

      function getStoredSelectedStaff_() {
        try {
          var raw = window.sessionStorage.getItem(STAFF_SESSION_KEY) || window.localStorage.getItem(STAFF_SESSION_KEY);
          if (!raw) return null;
          var parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return null;
          if (!parsed.staffName) return null;
          if (!parsed.staffId) parsed.staffId = parsed.staffName;
          return parsed;
        } catch (error) {
          return null;
        }
      }

      function persistSelectedStaff_(staff) {
        var value = staff && typeof staff === 'object' ? JSON.stringify(staff) : '';
        try {
          if (value) {
            window.sessionStorage.setItem(STAFF_SESSION_KEY, value);
            window.localStorage.setItem(STAFF_SESSION_KEY, value);
          } else {
            window.sessionStorage.removeItem(STAFF_SESSION_KEY);
            window.localStorage.removeItem(STAFF_SESSION_KEY);
          }
        } catch (error) {}
      }

      function getSelectedStaffDisplayText() {
        if (!state.selectedStaff) return '';
        return String(state.selectedStaff.displayName || state.selectedStaff.staffName || state.selectedStaff.staffId || '').trim();
      }

      function updateCurrentStaffUi() {
        var display = getSelectedStaffDisplayText();
        var banner = document.getElementById('staff-current-banner');
        var homeCurrent = document.getElementById('staff-home-current');
        var createPreview = document.getElementById('create-staff-preview');
        if (banner) {
          banner.textContent = display ? ('現在の担当者: ' + display) : '担当者を選択してください。';
          banner.classList.toggle('is-visible', true);
        }
        if (homeCurrent) homeCurrent.textContent = display || '未選択';
        if (createPreview) createPreview.value = display || '担当者ホームで担当者を選択';
      }

      function setSelectedStaff(staff) {
        state.selectedStaff = staff || null;
        persistSelectedStaff_(state.selectedStaff);
        updateCurrentStaffUi();
      }

      function getSelectedStaffById(staffId) {
        var list = Array.isArray(state.staffOptions) ? state.staffOptions : [];
        for (var i = 0; i < list.length; i++) {
          if (String(list[i].staffId || '').trim() === String(staffId || '').trim()) return list[i];
        }
        return null;
      }

      function renderStaffSelectList() {
        var listEl = document.getElementById('staff-select-list');
        var statusEl = document.getElementById('staff-select-status');
        var staffs = Array.isArray(state.staffOptions) ? state.staffOptions : [];
        if (!staffs.length) {
          statusEl.textContent = '担当者が未登録です。';
          listEl.innerHTML = '<p class="staff-inline-note">担当者追加から最初の担当者を登録してください。</p>';
          return;
        }
        statusEl.textContent = '担当者を選択してください。';
        listEl.innerHTML = staffs.map(function(staff) {
          var disabled = staff.status && staff.status !== '\u6709\u52b9';
          return '<article class="staff-card' + (disabled ? ' is-disabled' : '') + '">' +
            '<p class="staff-card-label">担当者名</p>' +
            '<h3 class="staff-card-title">' + escapeHtml(staff.staffName || '-') + '</h3>' +
            '<p class="staff-card-text">' + escapeHtml(staff.displayName || staff.staffName || '-') + '</p>' +
            '<div class="staff-card-actions">' +
            '<button class="btn btn-primary staff-select-trigger" type="button" data-staff-id="' + escapeHtml(staff.staffId || '') + '"' + (disabled ? ' disabled' : '') + '>この担当者で開始</button>' +
            '</div>' +
          '</article>';
        }).join('');
      }

      function loadStaffOptions(forceReload) {
        if (state.staffsLoaded && !forceReload) {
          renderStaffSelectList();
          return Promise.resolve(state.staffOptions);
        }
        document.getElementById('staff-select-status').textContent = '担当者を読み込みます。';
        return callWrappedApi('api_getStaffs', [{ includeInactive: false }]).then(function(response) {
          var items = extractArrayData(response, ['staffs', 'items']);
          state.staffOptions = Array.isArray(items) ? items : [];
          state.staffsLoaded = true;
          if (state.selectedStaff) {
            var latest = getSelectedStaffById(state.selectedStaff.staffId);
            setSelectedStaff(latest || null);
          }
          renderStaffSelectList();
          return state.staffOptions;
        }).catch(function(err) {
          document.getElementById('staff-select-status').textContent = '担当者の取得に失敗しました。';
          document.getElementById('staff-select-list').innerHTML = '<p class="staff-inline-note">' + escapeHtml(resolveErrorMessage(err)) + '</p>';
          throw err;
        });
      }

      function openStaffSelectScreen(options) {
        var opts = options && typeof options === 'object' ? options : {};
        if (!opts.ignoreBusy && isAnyBusy()) return;
        if (!opts.skipConfirm && !confirmNavigationIfNeeded('staffselect')) return;
        switchScreen('staffselect');
        loadStaffOptions(false).catch(function() {});
      }

      function openStaffAddScreen(options) {
        var opts = options && typeof options === 'object' ? options : {};
        if (!opts.ignoreBusy && isAnyBusy()) return;
        if (!opts.skipConfirm && !confirmNavigationIfNeeded('staffadd')) return;
        document.getElementById('staff-add-name').value = '';
        document.getElementById('staff-add-memo').value = '';
        setStaffMessage('', '');
        switchScreen('staffadd');
      }

      function openStaffHomeScreen(options) {
        var opts = options && typeof options === 'object' ? options : {};
        if (!opts.ignoreBusy && isAnyBusy()) return;
        if (!opts.skipConfirm && !confirmNavigationIfNeeded('staffhome')) return;
        if (!state.selectedStaff) {
          openStaffSelectScreen({ skipConfirm: true, ignoreBusy: true });
          return;
        }
        switchScreen('staffhome');
        updateCurrentStaffUi();
      }

      function ensureSelectedStaffOrRedirect(message) {
        if (state.selectedStaff) return true;
        if (message) setBanner('error', message);
        openStaffSelectScreen({ skipConfirm: true, ignoreBusy: true });
        return false;
      }

      function saveStaffSelection(staffId) {
        var staff = getSelectedStaffById(staffId);
        if (!staff) {
          setBanner('error', '担当者が見つかりませんでした。');
          return;
        }
        setSelectedStaff(staff);
        setBanner('success', '担当者を選択しました。');
        openStaffHomeScreen({ skipConfirm: true, ignoreBusy: true });
      }

      function createStaffAndSelect() {
        var name = String(document.getElementById('staff-add-name').value || '').trim();
        var memo = String(document.getElementById('staff-add-memo').value || '').trim();
        if (!name) {
          setStaffMessage('error', '担当者名を入力してください。');
          return;
        }
        setStaffMessage('info', '担当者を保存しています。');
        callWrappedApi('api_createStaff', [{ staffName: name, memo: memo }]).then(function(response) {
          var staff = response && response.data && (response.data.staff || response.data.item);
          if (!staff) throw new Error('担当者の保存結果を取得できませんでした。');
          state.staffsLoaded = false;
          return loadStaffOptions(true).then(function() {
            var latest = getSelectedStaffById(staff.staffId) || staff;
            setSelectedStaff(latest);
            setBanner('success', '担当者を追加しました。');
            setStaffMessage('success', '担当者を保存しました。');
            openStaffHomeScreen({ skipConfirm: true, ignoreBusy: true });
          });
        }).catch(function(err) {
          setStaffMessage('error', '担当者追加に失敗しました: ' + resolveErrorMessage(err));
        });
      }

      (function enhanceRoutingForStaff() {
        ROUTE_MODES.staffhome = true;
        ROUTE_MODES.staffselect = true;
        ROUTE_MODES.staffadd = true;

        switchScreen = function(mode) {
          var previousMode = state.viewMode || 'list';
          var nextMode = String(mode || '').toLowerCase();
          var allowed = { detail: true, edit: true, create: true, dashboard: true, list: true, staffhome: true, staffselect: true, staffadd: true };
          nextMode = allowed[nextMode] ? nextMode : 'list';
          if (!state.selectedStaff && (nextMode === 'list' || nextMode === 'dashboard' || nextMode === 'create')) {
            nextMode = Array.isArray(state.staffOptions) && state.staffOptions.length ? 'staffselect' : 'staffadd';
          }
          state.viewMode = nextMode;
          var ids = ['list-section', 'dashboard-section', 'detail-section', 'create-section', 'edit-section', 'staff-home-section', 'staff-select-section', 'staff-add-section'];
          ids.forEach(function(id) {
            var el = document.getElementById(id);
            if (!el) return;
            var modeMap = { 'list-section': 'list', 'dashboard-section': 'dashboard', 'detail-section': 'detail', 'create-section': 'create', 'edit-section': 'edit', 'staff-home-section': 'staffhome', 'staff-select-section': 'staffselect', 'staff-add-section': 'staffadd' };
            el.classList.toggle('screen-hidden', state.viewMode !== modeMap[id]);
          });
          clearStaleBannerOnScreenSwitch(previousMode, state.viewMode);
          updateScreenContext();
          refreshGlobalActionState();
          syncUrlWithState();
          if (state.viewMode === 'list' && !state.loading && !state.allItems.length) {
            loadItemsWithCurrentSort({ forceBaseLoad: true });
          }
        };

        var baseGetViewModeLabel = getViewModeLabel;
        getViewModeLabel = function(mode) {
          if (mode === 'staffhome') return '担当者ホーム';
          if (mode === 'staffselect') return '担当者選択';
          if (mode === 'staffadd') return '担当者追加';
          return baseGetViewModeLabel(mode);
        };

        var baseUpdateScreenContext = updateScreenContext;
        updateScreenContext = function() {
          if (state.viewMode !== 'staffhome' && state.viewMode !== 'staffselect' && state.viewMode !== 'staffadd') {
            return baseUpdateScreenContext();
          }
          var mode = state.viewMode || 'staffhome';
          var modeLabel = getViewModeLabel(mode);
          updateDocumentTitle(mode, '');
          var routeText = mode === 'staffhome'
            ? '\u4e3b\u8981\u64cd\u4f5c: \u5546\u54c1\u4e00\u89a7 / \u65b0\u898f\u5546\u54c1\u767b\u9332 / \u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9'
            : mode === 'staffselect'
              ? '\u4e3b\u8981\u64cd\u4f5c: \u62c5\u5f53\u8005\u3092\u9078\u3093\u3067\u958b\u59cb'
              : '\u4e3b\u8981\u64cd\u4f5c: \u62c5\u5f53\u8005\u540d\u3092\u5165\u529b\u3057\u3066\u4fdd\u5b58';
          document.getElementById('screen-context').textContent = '\u73fe\u5728: ' + modeLabel + ' | ' + routeText;
        };

        var baseRestoreRoute = restoreRoute;
        restoreRoute = function(route, options) {
          var resolved = route && typeof route === 'object' ? route : { mode: 'list', id: '' };
          var mode = normalizeRouteMode(resolved.mode);
          if (mode === 'staffhome') return openStaffHomeScreen({ skipConfirm: true, ignoreBusy: true });
          if (mode === 'staffselect') return openStaffSelectScreen({ skipConfirm: true, ignoreBusy: true });
          if (mode === 'staffadd') return openStaffAddScreen({ skipConfirm: true, ignoreBusy: true });
          return baseRestoreRoute(route, options);
        };

        var baseRefreshGlobalActionState = refreshGlobalActionState;
        refreshGlobalActionState = function() {
          baseRefreshGlobalActionState();
          var busy = isAnyBusy();
          ['open-staff-home', 'open-staff-switch', 'open-staff-add', 'staff-home-switch', 'staff-home-add'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.disabled = busy;
          });
        };

        var baseOpenCreateScreen = openCreateScreen;
        openCreateScreen = function(options) {
          if (!ensureSelectedStaffOrRedirect('担当者を選択してから新規登録してください。')) return;
          return baseOpenCreateScreen(options);
        };

        var baseOpenDashboardScreen = openDashboardScreen;
        openDashboardScreen = function(options) {
          if (!ensureSelectedStaffOrRedirect('担当者を選択してからダッシュボードを開いてください。')) return;
          return baseOpenDashboardScreen(options);
        };
      }());

      function initializeStaffApp() {
        state.selectedStaff = getStoredSelectedStaff_();
        updateCurrentStaffUi();
        return loadStaffOptions(false).finally(function() {
          var currentRoute = resolveRouteFromUrl();
          var hasExplicitRoute = !!String(window.location.hash || window.location.search || '').trim();
          if (!state.selectedStaff) {
            if (Array.isArray(state.staffOptions) && state.staffOptions.length) {
              openStaffSelectScreen({ skipConfirm: true, ignoreBusy: true });
            } else {
              openStaffAddScreen({ skipConfirm: true, ignoreBusy: true });
            }
            return;
          }
          if (!hasExplicitRoute || currentRoute.mode === 'list') {
            openStaffHomeScreen({ skipConfirm: true, ignoreBusy: true });
            return;
          }
          restoreRoute(currentRoute, { skipConfirm: true });
        });
      }

      function attachStaffEventHandlers() {
        var bindings = [
          ['open-staff-home', function() { openStaffHomeScreen(); }],
          ['open-staff-switch', function() { openStaffSelectScreen(); }],
          ['open-staff-add', function() { openStaffAddScreen(); }],
          ['staff-home-switch', function() { openStaffSelectScreen(); }],
          ['staff-home-add', function() { openStaffAddScreen(); }],
          ['staff-select-add', function() { openStaffAddScreen(); }],
          ['staff-add-back', function() { openStaffSelectScreen(); }],
          ['staff-add-save', function() { createStaffAndSelect(); }],
          ['staff-add-reset', function() { document.getElementById('staff-add-name').value = ''; document.getElementById('staff-add-memo').value = ''; setStaffMessage('', ''); }],
          ['staff-home-open-create', function() { openCreateScreen(); }],
          ['staff-home-open-list', function() { switchScreen('list'); }],
          ['staff-home-open-dashboard', function() { openDashboardScreen(); }]
        ];
        bindings.forEach(function(binding) {
          var el = document.getElementById(binding[0]);
          if (el) el.addEventListener('click', binding[1]);
        });
        document.getElementById('staff-select-list').addEventListener('click', function(event) {
          var target = event.target;
          if (!target || !target.classList.contains('staff-select-trigger')) return;
          saveStaffSelection(target.getAttribute('data-staff-id'));
        });
      }
    </script>
