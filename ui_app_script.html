    <script>
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatStructuredValue(value) {
        if (value == null) return "";
        if (typeof value === "object") {
          try {
            return JSON.stringify(value);
          } catch (error) {
            return "[object]";
          }
        }
        return String(value);
      }

      function setBanner(kind, message) {
        var el = document.getElementById("global-banner");
        var bannerKind = kind === "error" ? "error" : kind === "success" ? "success" : "info";
        el.className = "state-banner";
        if (!message) {
          el.textContent = "";
          if (state) {
            state.bannerState = null;
          }
          return;
        }
        el.classList.add("is-visible");
        el.classList.add(bannerKind === "error" ? "is-error" : bannerKind === "success" ? "is-success" : "is-info");
        el.textContent = message;
        if (state) {
          var bannerState = {
            kind: bannerKind,
            screenMode: state.viewMode || "list",
            keepForImmediateSwitch: bannerKind === "success" || bannerKind === "error"
          };
          state.bannerState = bannerState;
          if (bannerState.keepForImmediateSwitch) {
            setTimeout(function() {
              if (state.bannerState === bannerState) {
                state.bannerState.keepForImmediateSwitch = false;
              }
            }, 0);
          }
        }
      }

      function clearStaleBannerOnScreenSwitch(previousMode, nextMode) {
        if (!state || !state.bannerState) return;
        var bannerState = state.bannerState;
        if (bannerState.screenMode === nextMode) return;

        var keepImmediate = bannerState.keepForImmediateSwitch &&
          bannerState.screenMode === previousMode &&
          (bannerState.kind === "success" || bannerState.kind === "error");
        if (keepImmediate) return;

        setBanner("", "");
      }

      function normalizeExecutionError(err) {
        if (typeof err === "string") {
          return {
            type: "execution",
            message: err,
            raw: err
          };
        }
        if (err && typeof err === "object") {
          return {
            type: "execution",
            message: err.message || err.error || JSON.stringify(err),
            raw: err
          };
        }
        return {
          type: "execution",
          message: "Apps Script execution failed",
          raw: err
        };
      }

      function extractAllowedListArray(source) {
        if (Array.isArray(source)) return source;
        if (!source || typeof source !== "object") return null;
        if (Array.isArray(source.items)) return source.items;
        if (Array.isArray(source.list)) return source.list;
        if (Array.isArray(source.rows)) return source.rows;
        if (Array.isArray(source.monthly)) return source.monthly;
        if (Array.isArray(source.platforms)) return source.platforms;
        return null;
      }

      function normalizeApiEnvelope(raw) {
        if (raw && typeof raw === "object" && typeof raw.ok === "boolean") {
          return raw;
        }

        // Compatibility for older Apps Script responses that already wrap
        // payloads in `data` but do not include the modern `ok/error` fields.
        if (raw && typeof raw === "object" && !Array.isArray(raw) && Object.prototype.hasOwnProperty.call(raw, "data")) {
          var normalized = {
            ok: true,
            error: null,
            data: raw.data
          };
          Object.keys(raw).forEach(function(key) {
            if (key === "ok" || key === "error" || key === "data") return;
            normalized[key] = raw[key];
          });
          return normalized;
        }

        // Backward compatibility for older deployed Apps Script versions
        // that still return plain arrays for list/summary style APIs.
        if (extractAllowedListArray(raw) !== null) {
          return {
            ok: true,
            error: null,
            data: raw
          };
        }

        return {
          ok: false,
          error: {
            message: "Unexpected API response format (" + summarizeRawResponseShape(raw) + ")",
            code: "UNEXPECTED_API_RESPONSE",
            details: raw
          },
          data: null
        };
      }

      function resolveErrorMessage(error) {
        if (!error) return "不明なエラーです。";
        if (typeof error === "string") return error;
        if (error.message) return error.message;
        if (error.error && typeof error.error === "string") return error.error;
        if (error.error && error.error.message) return error.error.message;
        return "不明なエラーです。";
      }

      function formatDebugValue(value) {
        if (value === undefined) return "undefined";
        if (value === null) return "null";
        if (typeof value === "string") return value;
        try {
          return JSON.stringify(value, null, 2);
        } catch (error) {
          return String(value);
        }
      }

      function summarizeRawResponseShape(value) {
        if (value === undefined) return "type=undefined";
        if (value === null) return "type=null";
        if (Array.isArray(value)) return "type=array length=" + value.length;
        if (typeof value === "object") {
          var keys = Object.keys(value);
          return "type=object keys=" + (keys.length ? keys.join(",") : "(none)");
        }
        return "type=" + typeof value + " value=" + String(value);
      }

      function buildApiDebugHtml(error) {
        if (!error || !error.response || !error.response.error) return "";
        var details = error.response.error.details;
        var lines = [
          "message: " + resolveErrorMessage(error),
          "type: " + String(error.type || ""),
          "details:",
          formatDebugValue(details)
        ];
        return "<div class=\"validation-result is-visible\"><p class=\"validation-title is-warning\">API debug</p><pre>" +
          escapeHtml(lines.join("\n")) +
          "</pre></div>";
      }

      function toOptionObjects(list) {
        return (Array.isArray(list) ? list : []).map(function(entry) {
          if (entry && typeof entry === "object") {
            var value = entry.value != null ? String(entry.value) : "";
            var label = entry.label != null ? String(entry.label) : value;
            if (!value) return null;
            return { value: value, label: label };
          }
          var text = String(entry == null ? "" : entry).trim();
          if (!text) return null;
          return { value: text, label: text };
        }).filter(function(entry) {
          return !!entry;
        });
      }

      function extractMasterOptions(response, keys) {
        var data = response && response.data ? response.data : response;
        var masters = data && data.masters ? data.masters : (response && response.masters ? response.masters : {});
        if (!masters || typeof masters !== "object") return [];
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (!Object.prototype.hasOwnProperty.call(masters, key)) continue;
          var options = toOptionObjects(masters[key]);
          if (options.length) return options;
        }
        return [];
      }

      function runGasApi(apiName, args) {
        return new Promise(function(resolve, reject) {
          var runner = google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(function(err) {
              reject(normalizeExecutionError(err));
            });

          if (typeof runner[apiName] !== "function") {
            reject({
              type: "client",
              message: "Unknown Apps Script function: " + apiName,
              raw: apiName
            });
            return;
          }

          var callArgs = Array.isArray(args) ? args : [];
          runner[apiName].apply(runner, callArgs);
        });
      }

      function callWrappedApi(apiName, args) {
        return runGasApi(apiName, args).then(function(raw) {
          var response = normalizeApiEnvelope(raw);
          if (!response.ok) {
            throw {
              type: "api",
              message: resolveErrorMessage(response.error),
              response: response
            };
          }
          return response;
        });
      }

      function extractListItemsFromResponse(response) {
        var fromData = extractAllowedListArray(response && response.data);
        if (fromData !== null) return fromData;
        var fromResponse = extractAllowedListArray(response);
        if (fromResponse !== null) return fromResponse;
        return [];
      }

      var state = {
        allItems: [],
        viewItems: [],
        selectedById: {},
        sortKey: "",
        sortOrder: "asc",
        keyword: "",
        statusFilter: "",
        loading: false,
        viewMode: "list",
        detailItemId: "",
        detailLoading: false,
        detailItem: null,
        detailErrorMessage: "",
        editItemId: "",
        editInitialValues: null,
        editLoading: false,
        editSubmitting: false,
        createSubmitting: false,
        dashboardLoading: false,
        routeSyncLock: false,
        mastersLoaded: false,
        masterStatusOptions: [],
        masterShopOptions: [],
        bannerState: null
      };

      var ROUTE_MODES = {
        list: true,
        detail: true,
        create: true,
        edit: true,
        dashboard: true
      };

      function normalizeRouteMode(mode) {
        var normalized = String(mode || "").trim().toLowerCase();
        return ROUTE_MODES[normalized] ? normalized : "list";
      }

      function normalizeRouteId(id) {
        return String(id == null ? "" : id).trim();
      }

      function parseRouteFromParams(params) {
        var mode = normalizeRouteMode(
          params.get("v") ||
          params.get("view") ||
          params.get("mode")
        );
        var id = normalizeRouteId(
          params.get("id") ||
          params.get("itemId")
        );
        if ((mode === "detail" || mode === "edit") && !id) {
          mode = "list";
        }
        return { mode: mode, id: id };
      }

      function parseRouteFromHash(hash) {
        var raw = String(hash || "").replace(/^#/, "").trim();
        if (!raw) return null;
        if (raw.charAt(0) === "/") raw = raw.slice(1);

        var pathMatch = raw.match(/^([a-zA-Z]+)\/(.+)$/);
        if (pathMatch) {
          var pathMode = normalizeRouteMode(pathMatch[1]);
          var pathId = normalizeRouteId(pathMatch[2]);
          if ((pathMode === "detail" || pathMode === "edit") && !pathId) pathMode = "list";
          return { mode: pathMode, id: pathId };
        }

        if (raw.indexOf("=") === -1) {
          var modeOnly = normalizeRouteMode(raw.split(":")[0]);
          var simpleId = normalizeRouteId(raw.split(":")[1] || "");
          if ((modeOnly === "detail" || modeOnly === "edit") && !simpleId) modeOnly = "list";
          return { mode: modeOnly, id: simpleId };
        }

        return parseRouteFromParams(new URLSearchParams(raw));
      }

      function parseRouteFromSearch(search) {
        var raw = String(search || "").replace(/^\?/, "").trim();
        if (!raw) return null;
        return parseRouteFromParams(new URLSearchParams(raw));
      }

      function resolveRouteFromUrl() {
        var fromHash = parseRouteFromHash(window.location.hash);
        if (fromHash) return fromHash;
        var fromSearch = parseRouteFromSearch(window.location.search);
        if (fromSearch) return fromSearch;
        return { mode: "list", id: "" };
      }

      function getCurrentRouteState() {
        var mode = normalizeRouteMode(state.viewMode || "list");
        var id = "";
        if (mode === "detail") {
          id = normalizeRouteId(state.detailItemId);
        } else if (mode === "edit") {
          id = normalizeRouteId(state.editItemId || state.detailItemId);
        }
        return { mode: mode, id: id };
      }

      function buildHashFromRoute(route) {
        var normalizedMode = normalizeRouteMode(route && route.mode);
        var normalizedId = normalizeRouteId(route && route.id);
        var params = new URLSearchParams();
        params.set("v", normalizedMode);
        if ((normalizedMode === "detail" || normalizedMode === "edit") && normalizedId) {
          params.set("id", normalizedId);
        }
        return "#" + params.toString();
      }

      function isSameRoute(routeA, routeB) {
        var a = routeA || {};
        var b = routeB || {};
        return normalizeRouteMode(a.mode) === normalizeRouteMode(b.mode) &&
          normalizeRouteId(a.id) === normalizeRouteId(b.id);
      }

      function syncUrlWithState(options) {
        var opts = options && typeof options === "object" ? options : {};
        var targetHash = buildHashFromRoute(getCurrentRouteState());
        if (window.location.hash === targetHash) return;

        if (opts.replace) {
          window.history.replaceState(null, "", window.location.pathname + window.location.search + targetHash);
          return;
        }

        state.routeSyncLock = true;
        window.location.hash = targetHash;
      }

      function restoreRoute(route, options) {
        var opts = options && typeof options === "object" ? options : {};
        var resolved = route && typeof route === "object" ? route : { mode: "list", id: "" };
        var targetMode = normalizeRouteMode(resolved.mode);
        var targetId = normalizeRouteId(resolved.id);

        if (!opts.skipConfirm && !confirmNavigationIfNeeded(targetMode)) {
          syncUrlWithState({ replace: true });
          return;
        }

        if (targetMode === "detail") {
          openDetailById(targetId, { silentSuccessBanner: true, fromRouteRestore: true });
          return;
        }
        if (targetMode === "edit") {
          openEditScreen(targetId, { fromRouteRestore: true });
          return;
        }
        if (targetMode === "create") {
          openCreateScreen({ skipConfirm: true, ignoreBusy: true });
          return;
        }
        if (targetMode === "dashboard") {
          openDashboardScreen({ skipConfirm: true, ignoreBusy: true });
          return;
        }
        switchScreen("list");
      }

      function getViewModeLabel(mode) {
        if (mode === "detail") return "商品詳細";
        if (mode === "edit") return "商品編集";
        if (mode === "create") return "新規商品登録";
        if (mode === "dashboard") return "ダッシュボード";
        return "商品一覧";
      }

      function updateDocumentTitle(mode, contextId) {
        var modeLabel = getViewModeLabel(mode);
        var idSuffix = (mode === "detail" || mode === "edit") && contextId ? " | " + contextId : "";
        document.title = "WAVE | NETSHOP管理 | " + modeLabel + idSuffix;
      }

      function updateScreenContext() {
        var mode = state.viewMode || "list";
        var contextId = mode === "edit" ? state.editItemId : state.detailItemId;
        var idText = (mode === "detail" || mode === "edit") && contextId ? " / 管理ID: " + contextId : "";
        var modeLabel = getViewModeLabel(mode);
        var routeText = mode === "list"
          ? "主要導線: 詳細 / ダッシュボード / 新規登録"
          : mode === "detail"
            ? "主要導線: 一覧へ戻る / 編集へ"
            : mode === "edit"
              ? "主要導線: 詳細へ戻る / 一覧へ"
              : mode === "create"
                ? "主要導線: 一覧へ戻る / 保存"
                : "主要導線: 一覧へ戻る / 再取得";
        updateDocumentTitle(mode, contextId);
        document.getElementById("screen-context").textContent = "現在: " + modeLabel + idText + " | " + routeText;
      }

      function isAnyBusy() {
        return !!(
          state.loading ||
          state.detailLoading ||
          state.createSubmitting ||
          state.editLoading ||
          state.editSubmitting ||
          state.dashboardLoading
        );
      }

      function hasCreateFormChanges() {
        var payload = collectCreatePayload();
        return Object.keys(payload).some(function(key) {
          return String(payload[key] || "").trim() !== "";
        });
      }

      function hasEditUnsavedChanges() {
        if (!state.editInitialValues) return false;
        var current = collectEditPayload();
        var initial = state.editInitialValues;
        return Object.keys(current).some(function(key) {
          return String(current[key] || "").trim() !== String(initial[key] || "").trim();
        });
      }

      function confirmAction(message) {
        return window.confirm(String(message || "").trim());
      }

      function confirmNavigationIfNeeded(targetMode) {
        if (state.createSubmitting || state.editSubmitting || state.editLoading) return false;

        if (state.viewMode === "create" && targetMode !== "create" && hasCreateFormChanges()) {
          return confirmAction("新規登録フォームの入力内容を破棄して移動します。よろしいですか？");
        }
        if (state.viewMode === "edit" && targetMode !== "edit" && hasEditUnsavedChanges()) {
          return confirmAction("編集内容が保存されていません。破棄して移動します。よろしいですか？");
        }
        return true;
      }

      function refreshGlobalActionState() {
        var busy = isAnyBusy();
        document.getElementById("open-list").disabled = busy || state.viewMode === "list";
        document.getElementById("open-dashboard").disabled = busy;
        document.getElementById("open-create-item").disabled = busy;
        document.getElementById("reload-items").disabled = busy || state.viewMode !== "list";
      }

      function getCurrentHeaders(items) {
        if (!items || !items.length) return [];
        var seen = {};
        var headers = [];
        items.forEach(function(item) {
          if (!item || typeof item !== "object" || Array.isArray(item)) return;
          Object.keys(item).forEach(function(key) {
            if (seen[key]) return;
            seen[key] = true;
            headers.push(key);
          });
        });
        return headers;
      }

      function resolveItemId(item) {
        if (!item || typeof item !== "object") return "";
        if (item.id != null && String(item.id).trim() !== "") return String(item.id).trim();
        if (item["管理ID"] != null && String(item["管理ID"]).trim() !== "") return String(item["管理ID"]).trim();
        return "";
      }

      function resolveItemStatus(item) {
        if (!item || typeof item !== "object") return "";
        if (item.status != null && String(item.status).trim() !== "") return String(item.status).trim();
        if (item["ステータス"] != null && String(item["ステータス"]).trim() !== "") return String(item["ステータス"]).trim();
        return "";
      }

      function buildSearchText(item, headers) {
        return (headers || []).map(function(header) {
          return formatStructuredValue(item && item[header]);
        }).join(" ").toLowerCase();
      }

      function applyClientFilters(items) {
        var keyword = String(state.keyword || "").trim().toLowerCase();
        var statusFilter = String(state.statusFilter || "").trim();
        var statusFilteredItems = (items || []).filter(function(item) {
          if (statusFilter) {
            var itemStatus = resolveItemStatus(item);
            if (itemStatus !== statusFilter) return false;
          }
          return true;
        });

        if (!keyword) return statusFilteredItems;

        var searchableHeaders = getCurrentHeaders(statusFilteredItems);
        return statusFilteredItems.filter(function(item) {
          return buildSearchText(item, searchableHeaders).indexOf(keyword) !== -1;
        });
      }

      function syncListControlsToState() {
        var keywordInput = document.getElementById("keyword-search");
        var statusSelect = document.getElementById("status-filter");
        if (keywordInput) {
          state.keyword = keywordInput.value || "";
        }
        if (statusSelect) {
          state.statusFilter = statusSelect.value || "";
        }
      }

      function pruneSelectionWithItems(items) {
        var validIdMap = {};
        (items || []).forEach(function(item) {
          var id = resolveItemId(item);
          if (id) validIdMap[id] = true;
        });
        Object.keys(state.selectedById).forEach(function(id) {
          if (!validIdMap[id]) delete state.selectedById[id];
        });
      }

      function getSelectedIds() {
        return Object.keys(state.selectedById).filter(function(id) {
          return !!state.selectedById[id];
        });
      }

      function updateSelectedCount() {
        document.getElementById("selected-count").textContent = "選択 " + getSelectedIds().length + " 件";
      }

      function updateToolbarOptions(items) {
        var list = items || [];
        var statusSelect = document.getElementById("status-filter");
        var bulkStatusSelect = document.getElementById("bulk-status");
        var sortKeySelect = document.getElementById("sort-key");
        var previousStatus = state.statusFilter;
        var previousBulkStatus = bulkStatusSelect.value;
        var previousSortKey = state.sortKey;
        var headers = getCurrentHeaders(list);
        var statusMap = {};

        list.forEach(function(item) {
          var status = resolveItemStatus(item);
          if (status) statusMap[status] = true;
        });

        var statuses = Object.keys(statusMap).sort();
        statusSelect.innerHTML = "<option value=\"\">すべてのステータス</option>" + statuses.map(function(status) {
          return "<option value=\"" + escapeHtml(status) + "\">" + escapeHtml(status) + "</option>";
        }).join("");
        statusSelect.value = statuses.indexOf(previousStatus) !== -1 ? previousStatus : "";
        state.statusFilter = statusSelect.value;

        bulkStatusSelect.innerHTML = "<option value=\"\">変更後ステータス</option>" + statuses.map(function(status) {
          return "<option value=\"" + escapeHtml(status) + "\">" + escapeHtml(status) + "</option>";
        }).join("");
        bulkStatusSelect.value = statuses.indexOf(previousBulkStatus) !== -1 ? previousBulkStatus : "";

        sortKeySelect.innerHTML = "<option value=\"\">並び替えなし</option>" + headers.map(function(header) {
          return "<option value=\"" + escapeHtml(header) + "\">" + escapeHtml(header) + "</option>";
        }).join("");
        sortKeySelect.value = headers.indexOf(previousSortKey) !== -1 ? previousSortKey : "";
        state.sortKey = sortKeySelect.value;
      }

      function updateSelectAllState() {
        var selectAllEl = document.getElementById("select-all-rows");
        if (!selectAllEl) return;

        var selectableIds = state.viewItems.map(resolveItemId).filter(function(id) { return !!id; });
        var selectedVisibleCount = selectableIds.filter(function(id) {
          return !!state.selectedById[id];
        }).length;

        if (!selectableIds.length) {
          selectAllEl.checked = false;
          selectAllEl.indeterminate = false;
          return;
        }

        selectAllEl.checked = selectedVisibleCount === selectableIds.length;
        selectAllEl.indeterminate = selectedVisibleCount > 0 && selectedVisibleCount < selectableIds.length;
      }

      function updateBulkUiState() {
        var action = document.getElementById("bulk-action").value;
        var bulkAction = document.getElementById("bulk-action");
        var bulkStatus = document.getElementById("bulk-status");
        var executeBtn = document.getElementById("bulk-execute");
        var selectedCount = getSelectedIds().length;
        var statusSelected = String(bulkStatus.value || "").trim() !== "";
        bulkStatus.style.display = action === "updateStatus" ? "" : "none";
        bulkAction.disabled = state.loading;
        bulkStatus.disabled = state.loading;
        executeBtn.disabled = state.loading ||
          selectedCount === 0 ||
          !action ||
          (action === "updateStatus" && !statusSelected);
      }

      function isHighImpactStatus(statusValue) {
        var text = String(statusValue || "").trim();
        if (!text) return false;
        return /(キャンセル|取消|無効|停止|アーカイブ|削除)/.test(text);
      }

      function buildBulkConfirmMessage(action, selectedCount, statusValue) {
        var actionLabel = action === "updateStatus"
          ? "一括ステータス変更"
          : action === "recalculate"
            ? "一括再計算"
            : "一括無効化";
        var details = [actionLabel + "を " + selectedCount + " 件に実行します。"];

        if (action === "updateStatus") {
          details.push("変更後ステータス: " + String(statusValue || "").trim());
          if (isHighImpactStatus(statusValue)) {
            details.push("この操作は取り消しづらい可能性があります。");
          }
        }
        if (action === "disable") {
          details.push("無効化後の復旧には追加操作が必要になる場合があります。");
        }
        details.push("実行してよろしいですか？");
        return {
          label: actionLabel,
          message: details.join("\n")
        };
      }

      function setInlineMessageById(elementId, kind, message) {
        var el = document.getElementById(elementId);
        if (!el) return;
        el.className = "inline-message";
        if (!message) {
          el.textContent = "";
          return;
        }
        el.classList.add("is-visible");
        el.classList.add(kind === "error" ? "is-error" : kind === "success" ? "is-success" : "is-info");
        el.textContent = message;
      }

      function setInlineMessage(kind, message) {
        setInlineMessageById("create-message", kind, message);
      }

      function setEditInlineMessage(kind, message) {
        setInlineMessageById("edit-message", kind, message);
      }

      function getValidationResultElementId(formType) {
        return formType === "edit" ? "edit-validation-result" : "create-validation-result";
      }

      function clearValidationResult(formType) {
        var el = document.getElementById(getValidationResultElementId(formType));
        if (!el) return;
        el.className = "validation-result";
        el.innerHTML = "";
      }

      function normalizeValidationIssues(list) {
        return (Array.isArray(list) ? list : []).map(function(entry, index) {
          if (entry && typeof entry === "object") {
            var code = entry.code != null ? String(entry.code).trim() : "";
            var field = entry.field != null ? String(entry.field).trim() : "";
            var message = entry.message != null ? String(entry.message).trim() : "";
            var text = message;
            if (!text) text = formatStructuredValue(entry);
            if (!text) text = "Issue " + (index + 1);
            return { code: code, field: field, message: text };
          }
          var raw = String(entry == null ? "" : entry).trim();
          return { code: "", field: "", message: raw || ("Issue " + (index + 1)) };
        });
      }

      function extractValidationResult(response) {
        var source = null;
        if (response && response.data && typeof response.data === "object") {
          source = response.data;
        } else if (response && response.error && response.error.details && typeof response.error.details === "object") {
          source = response.error.details;
        } else if (response && typeof response === "object") {
          source = response;
        }

        var errors = normalizeValidationIssues(source && source.errors);
        var warnings = normalizeValidationIssues(source && source.warnings);
        return {
          errors: errors,
          warnings: warnings
        };
      }

      function renderValidationResult(formType, result) {
        var el = document.getElementById(getValidationResultElementId(formType));
        if (!el) return;

        var errors = result && Array.isArray(result.errors) ? result.errors : [];
        var warnings = result && Array.isArray(result.warnings) ? result.warnings : [];
        el.className = "validation-result is-visible";

        if (!errors.length && !warnings.length) {
          el.innerHTML = "<p class=\"validation-empty\">エラー・警告はありません。</p>";
          return;
        }

        var html = "";
        if (errors.length) {
          html += "<div class=\"validation-section\"><p class=\"validation-title is-error\">Errors (" + errors.length + ")</p><ul class=\"validation-list\">";
          errors.forEach(function(issue) {
            var parts = [];
            if (issue.code) parts.push("[" + issue.code + "]");
            if (issue.field) parts.push(issue.field + ":");
            parts.push(issue.message || "");
            html += "<li>" + escapeHtml(parts.join(" ").trim()) + "</li>";
          });
          html += "</ul></div>";
        }
        if (warnings.length) {
          html += "<div class=\"validation-section\"><p class=\"validation-title is-warning\">Warnings (" + warnings.length + ")</p><ul class=\"validation-list\">";
          warnings.forEach(function(issue) {
            var parts = [];
            if (issue.code) parts.push("[" + issue.code + "]");
            if (issue.field) parts.push(issue.field + ":");
            parts.push(issue.message || "");
            html += "<li>" + escapeHtml(parts.join(" ").trim()) + "</li>";
          });
          html += "</ul></div>";
        }
        el.innerHTML = html;
      }

      function runSavePreValidation(formType) {
        var isEdit = formType === "edit";

        var messageSetter = isEdit ? setEditInlineMessage : setInlineMessage;

          var parsed = extractValidationResult(response);

          if (parsed.errors.length) {
            messageSetter("error", "Errors が見つかりました。内容を修正してから保存してください。");

      function findFirstValue(item, keys) {
        if (!item || typeof item !== "object") return "";
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (!Object.prototype.hasOwnProperty.call(item, key)) continue;
          var value = item[key];
          if (value == null) continue;
          if (typeof value === "string" && value.trim() === "") continue;
          return value;
        }
        return "";
      }

      function toDisplayText(value) {
        var text = formatStructuredValue(value);
        return text === "" ? "-" : text;
      }

      function toDisplayMoney(value) {
        var text = formatStructuredValue(value);
        if (text === "") return "-";
        var normalized = text.replace(/,/g, "").trim();
        if (/^-?\d+(\.\d+)?$/.test(normalized)) {
          var num = Number(normalized);
          if (Number.isFinite(num)) {
            return num.toLocaleString("ja-JP");
          }
        }
        return text;
      }

      function extractArrayData(response, candidateKeys) {
        if (!response || typeof response !== "object") return [];
        var data = response.data != null ? response.data : response;
        if (Array.isArray(data)) return data;
        if (!data || typeof data !== "object") return [];

        var keys = Array.isArray(candidateKeys) ? candidateKeys : [];
        for (var i = 0; i < keys.length; i++) {
          if (Array.isArray(data[keys[i]])) return data[keys[i]];
        }
        return [];
      }

      function getTableHeaders(rows) {
        if (!Array.isArray(rows) || !rows.length) return [];
        var firstRow = rows[0];
        if (!firstRow || typeof firstRow !== "object" || Array.isArray(firstRow)) return ["値"];
        return Object.keys(firstRow);
      }

      function buildSimpleTableHtml(rows) {
        var list = Array.isArray(rows) ? rows : [];
        if (!list.length) {
          return "<span class=\"muted\">表示できるデータがありません。</span>";
        }

        var headers = getTableHeaders(list);
        var html = "<div class=\"table-wrap\"><table><thead><tr>";
        headers.forEach(function(header) {
          html += "<th>" + escapeHtml(header) + "</th>";
        });
        html += "</tr></thead><tbody>";

        list.forEach(function(row) {
          html += "<tr>";
          if (!row || typeof row !== "object" || Array.isArray(row)) {
            html += "<td>" + escapeHtml(formatStructuredValue(row)) + "</td>";
          } else {
            headers.forEach(function(header) {
              html += "<td>" + escapeHtml(formatStructuredValue(row[header])) + "</td>";
            });
          }
          html += "</tr>";
        });
        html += "</tbody></table></div>";
        return html;
      }

      function hasActiveListFilters() {
        return !!(String(state.keyword || "").trim() || String(state.statusFilter || "").trim());
      }

      function formatKpiValue(key, value) {
        var text = formatStructuredValue(value);
        if (text === "") return "-";

        var normalized = text.replace(/,/g, "").trim();
        if (/^-?\d+(\.\d+)?$/.test(normalized)) {
          var num = Number(normalized);
          if (Number.isFinite(num)) {
            if (/rate|率/i.test(String(key || ""))) return num.toFixed(1) + "%";
            return num.toLocaleString("ja-JP");
          }
        }
        return text;
      }

      function loadDashboard() {
        setDashboardLoading(true);
        setBanner("info", "ダッシュボードを取得しています。");
        document.getElementById("dashboard-kpi-status").textContent = "読み込み中...";
        document.getElementById("dashboard-monthly-status").textContent = "読み込み中...";
        document.getElementById("dashboard-platform-status").textContent = "読み込み中...";
        document.getElementById("dashboard-kpi-content").innerHTML = "<span class=\"muted\">データを取得しています。</span>";
        document.getElementById("dashboard-monthly-content").innerHTML = "<span class=\"muted\">データを取得しています。</span>";
        document.getElementById("dashboard-platform-content").innerHTML = "<span class=\"muted\">データを取得しています。</span>";

        return Promise.allSettled([
          callWrappedApi("api_uiDashboardKpi"),
          callWrappedApi("api_getMonthlySummary"),
          callWrappedApi("api_getPlatformSummary")
        ]).then(function(results) {
          var kpiResult = results[0];
          var monthlyResult = results[1];
          var platformResult = results[2];
          var failedCount = 0;

          if (kpiResult.status === "fulfilled") {
            renderDashboardKpi(kpiResult.value && kpiResult.value.data ? kpiResult.value.data : null);
          } else {
            failedCount++;
            document.getElementById("dashboard-kpi-status").textContent = "取得失敗";
            document.getElementById("dashboard-kpi-content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(kpiResult.reason)) + "</span>";
          }

          if (monthlyResult.status === "fulfilled") {
            renderDashboardTable(
              "dashboard-monthly-status",
              "dashboard-monthly-content",
              extractArrayData(monthlyResult.value, ["monthly", "items"])
            );
          } else {
            failedCount++;
            document.getElementById("dashboard-monthly-status").textContent = "取得失敗";
            document.getElementById("dashboard-monthly-content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(monthlyResult.reason)) + "</span>";
          }

          if (platformResult.status === "fulfilled") {
            renderDashboardTable(
              "dashboard-platform-status",
              "dashboard-platform-content",
              extractArrayData(platformResult.value, ["platforms", "items"])
            );
          } else {
            failedCount++;
            document.getElementById("dashboard-platform-status").textContent = "取得失敗";
            document.getElementById("dashboard-platform-content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(platformResult.reason)) + "</span>";
          }

          if (failedCount === 0) {
            setBanner("success", "ダッシュボードを取得しました。");
          } else if (failedCount < 3) {
            setBanner("error", "ダッシュボードの一部取得に失敗しました。");
          } else {
            setBanner("error", "ダッシュボードの取得に失敗しました。");
          }
        }).catch(function(err) {
          setBanner("error", "ダッシュボードの取得に失敗しました: " + resolveErrorMessage(err));
        }).finally(function() {
          setDashboardLoading(false);
        });
      }

          fee: getItemFieldText(safeItem, ["fee", "サイト利用料"]),
          shipping: getItemFieldText(safeItem, ["shipping", "配送料"]),
          zip: getItemFieldText(safeItem, ["zip", "郵便番号"]),
          pref: getItemFieldText(safeItem, ["pref", "都道府県"]),
          addr2: getItemFieldText(safeItem, ["addr2", "住所2(地番)"]),
          addr3: getItemFieldText(safeItem, ["addr3", "住所3(建物名)"]),
          memo: getItemFieldText(safeItem, ["memo", "備考"])
        };
        state.editInitialValues = values;
        ensureSelectHasValue("edit-status", values.status);
        ensureSelectHasValue("edit-shop", values.shop);
        document.getElementById("edit-item-name").value = values.itemName;
        document.getElementById("edit-cost").value = values.cost;
        document.getElementById("edit-price-final").value = values.priceFinal;
        document.getElementById("edit-fee").value = values.fee;
        document.getElementById("edit-shipping").value = values.shipping;
        document.getElementById("edit-zip").value = values.zip;
        document.getElementById("edit-pref").value = values.pref;
        document.getElementById("edit-addr2").value = values.addr2;
        document.getElementById("edit-addr3").value = values.addr3;
        document.getElementById("edit-memo").value = values.memo;
      }

      function buildEditUpdatePayload() {
        var current = collectEditPayload();
        var initial = state.editInitialValues || {};
        var payload = {};
        Object.keys(current).forEach(function(key) {
          var currentValue = String(current[key] || "").trim();
          var initialValue = String(initial[key] || "").trim();
          if (currentValue !== initialValue) {
            payload[key] = currentValue;
          }
        });
        return payload;
      }

      function resetEditFormToInitial() {
        if (!state.editInitialValues) return;
        ensureSelectHasValue("edit-status", state.editInitialValues.status);
        ensureSelectHasValue("edit-shop", state.editInitialValues.shop);
        document.getElementById("edit-item-name").value = state.editInitialValues.itemName || "";
        document.getElementById("edit-cost").value = state.editInitialValues.cost || "";
        document.getElementById("edit-price-final").value = state.editInitialValues.priceFinal || "";
        document.getElementById("edit-fee").value = state.editInitialValues.fee || "";
        document.getElementById("edit-shipping").value = state.editInitialValues.shipping || "";
        document.getElementById("edit-zip").value = state.editInitialValues.zip || "";
        document.getElementById("edit-pref").value = state.editInitialValues.pref || "";
        document.getElementById("edit-addr2").value = state.editInitialValues.addr2 || "";
        document.getElementById("edit-addr3").value = state.editInitialValues.addr3 || "";
        document.getElementById("edit-memo").value = state.editInitialValues.memo || "";
        clearValidationResult("edit");
      }

      function collectEditPayload() {
        return {
          status: String(document.getElementById("edit-status").value || "").trim(),
          shop: String(document.getElementById("edit-shop").value || "").trim(),
          itemName: String(document.getElementById("edit-item-name").value || "").trim(),
          cost: String(document.getElementById("edit-cost").value || "").trim(),
          priceFinal: String(document.getElementById("edit-price-final").value || "").trim(),
          fee: String(document.getElementById("edit-fee").value || "").trim(),
          shipping: String(document.getElementById("edit-shipping").value || "").trim(),
          zip: String(document.getElementById("edit-zip").value || "").trim(),
          pref: String(document.getElementById("edit-pref").value || "").trim(),
          addr2: String(document.getElementById("edit-addr2").value || "").trim(),
          addr3: String(document.getElementById("edit-addr3").value || "").trim(),
          memo: String(document.getElementById("edit-memo").value || "").trim()
        };
      }

      function openEditScreen(itemId, options) {
        var opts = options && typeof options === "object" ? options : {};
        var normalizedId = String(itemId || state.detailItemId || "").trim();
        if (!normalizedId) {
          if (opts.fromRouteRestore) {
            setBanner("error", "編集対象を復元できないため一覧へ戻りました。");
            switchScreen("list");
          } else {
            setBanner("error", "管理IDを特定できないため編集画面を開けません。");
          }
          return;
        }

        state.editItemId = normalizedId;
        state.detailItemId = normalizedId;
        state.editInitialValues = null;
        setEditInlineMessage("", "");
        clearValidationResult("edit");
        switchScreen("edit");
        setEditLoading(true);
        setEditInlineMessage("info", "編集データを取得しています...");

        var mastersPromise = loadCreateMastersIfNeeded(false, "edit-message").catch(function() {
          return null;
        });
        var detailPromise = callWrappedApi("getItem", [normalizedId]).then(function(response) {
          var item = response && response.data ? response.data : null;
          if (!item) {
            throw new Error("編集対象データが見つかりません。");
          }
          setEditFormValues(item);
        });

        Promise.all([mastersPromise, detailPromise]).then(function() {
          resetEditFormToInitial();
        }).catch(function(err) {
          if (opts.fromRouteRestore) {
            setBanner("error", "編集画面を復元できないため一覧へ戻りました。");
            switchScreen("list");
          } else {
            setEditInlineMessage("error", "編集データの取得に失敗しました: " + resolveErrorMessage(err));
            setBanner("error", "編集画面の初期化に失敗しました。");
          }
        }).finally(function() {
          setEditLoading(false);
        });
      }

      function saveEditedItem() {
        if (state.editSubmitting || state.editLoading) return;
        var itemId = String(state.editItemId || "").trim();
        if (!itemId) {
          setEditInlineMessage("error", "管理IDが取得できないため保存できません。");
          return;
        }

        if (!state.editInitialValues) {
          setEditInlineMessage("error", "初期データが未取得のため保存できません。");
          return;
        }

        setEditSubmitting(true);
        setEditInlineMessage("info", "保存しています...");
        var payload = buildEditUpdatePayload();
        if (!Object.keys(payload).length) {
          setEditInlineMessage("info", "変更がないため保存は不要です。");
          setEditSubmitting(false);
          return;
        }

        callWrappedApi("api_updateItem", [itemId, payload]).then(function() {
          setEditInlineMessage("success", "保存に成功しました。");
          setBanner("success", "商品を更新しました。");
          openDetailById(itemId, { silentSuccessBanner: true });
        }).catch(function(err) {
          setEditInlineMessage("error", "保存に失敗しました: " + resolveErrorMessage(err));
          setBanner("error", "商品の更新に失敗しました。");
        }).finally(function() {
          setEditSubmitting(false);
        });
      }

      function openDetailById(itemId, options) {
        var opts = options && typeof options === "object" ? options : {};
        var normalizedId = String(itemId || "").trim();
        if (!normalizedId) {
          if (opts.fromRouteRestore) {
            setBanner("error", "詳細対象を復元できないため一覧へ戻りました。");
            switchScreen("list");
          } else {
            setBanner("error", "管理IDを特定できないため詳細を開けません。");
          }
          return Promise.resolve();
        }

        state.detailItemId = normalizedId;
        state.detailLoading = true;
        state.detailItem = null;
        state.detailErrorMessage = "";
        switchScreen("detail");
        renderDetailContent();

        return callWrappedApi("getItem", [normalizedId]).then(function(response) {
          state.detailItem = response && response.data ? response.data : null;
          state.detailErrorMessage = state.detailItem ? "" : "対象データが見つかりません。";
          if (!state.detailItem && opts.fromRouteRestore) {
            setBanner("error", "詳細対象を復元できないため一覧へ戻りました。");
            switchScreen("list");
            return;
          }
          if (!opts.silentSuccessBanner) {
            if (state.detailItem) {
              setBanner("info", "商品詳細を表示しました。");
            } else {
              setBanner("error", "対象データが見つかりませんでした。");
            }
          }
        }).catch(function(err) {
          state.detailItem = null;
          state.detailErrorMessage = resolveErrorMessage(err);
          if (opts.fromRouteRestore) {
            setBanner("error", "詳細画面を復元できないため一覧へ戻りました。");
            switchScreen("list");
          } else {
            setBanner("error", "商品詳細の取得に失敗しました: " + resolveErrorMessage(err));
          }
        }).finally(function() {
          state.detailLoading = false;
          renderDetailContent();
        });
      }

      function renderItemsTable(items) {
        state.viewItems = items || [];
        if (!state.viewItems.length) {
          var hasSourceItems = Array.isArray(state.allItems) && state.allItems.length > 0;
          var emptyStatus = hasSourceItems && hasActiveListFilters() ? "該当データなし" : "データなし";
          var emptyMessage = hasSourceItems && hasActiveListFilters()
            ? "検索条件に一致するデータがありません。条件を変更して再度確認してください。"
            : "表示できるデータがありません。";
          document.getElementById("items-status").textContent = emptyStatus;
          document.getElementById("content").innerHTML = "<span class=\"muted\">" + escapeHtml(emptyMessage) + "</span>";
          updateSelectedCount();
          updateBulkUiState();
          return;
        }

        var headers = getCurrentHeaders(state.viewItems);
        var html = "<div class=\"table-wrap\"><table><thead><tr>";
        html += "<th class=\"select-cell\"><input id=\"select-all-rows\" type=\"checkbox\" aria-label=\"全選択\"></th>";
        html += "<th class=\"action-cell\">詳細</th>";
        headers.forEach(function(header) {
          html += "<th>" + escapeHtml(header) + "</th>";
        });
        html += "</tr></thead><tbody>";

        state.viewItems.forEach(function(item) {
          var itemId = resolveItemId(item);
          var checked = itemId && state.selectedById[itemId] ? " checked" : "";
          var disabled = itemId && !state.loading ? "" : " disabled";
          html += "<tr>";
          html += "<td class=\"select-cell\"><input class=\"row-select\" type=\"checkbox\" data-item-id=\"" + escapeHtml(itemId) + "\"" + checked + disabled + " aria-label=\"行選択\"></td>";
          html += "<td class=\"action-cell\"><button class=\"btn btn-secondary btn-small row-detail-open\" type=\"button\" data-item-id=\"" + escapeHtml(itemId) + "\"" + disabled + ">詳細</button></td>";
          headers.forEach(function(header) {
            html += "<td>" + escapeHtml(formatStructuredValue(item[header])) + "</td>";
          });
          html += "</tr>";
        });

        html += "</tbody></table></div>";
        document.getElementById("items-status").textContent = "読み込み完了 " + state.viewItems.length + " 件";
        document.getElementById("content").innerHTML = html;
        updateSelectAllState();
        updateSelectedCount();
        updateBulkUiState();
      }

      function applyAndRenderCurrentView() {
        syncListControlsToState();
        var filteredItems = applyClientFilters(state.allItems);
        pruneSelectionWithItems(filteredItems);
        renderItemsTable(filteredItems);
      }

      function setLoading(flag, message) {
        state.loading = !!flag;
        document.getElementById("reload-items").disabled = !!flag;
        document.getElementById("open-dashboard").disabled = !!flag;
        document.getElementById("open-create-item").disabled = !!flag;
        document.getElementById("open-list").disabled = !!flag || state.viewMode === "list";
        document.getElementById("sort-order-toggle").disabled = !!flag;
        document.getElementById("keyword-search").disabled = !!flag;
        document.getElementById("status-filter").disabled = !!flag;
        document.getElementById("sort-key").disabled = !!flag;
        if (message) {
          document.getElementById("items-status").textContent = message;
        }
        updateBulkUiState();
        refreshGlobalActionState();
      }

      function loadItemsWithCurrentSort(options) {
        var opts = options || {};
        var useSort = !opts.forceBaseLoad && !!state.sortKey;
        setLoading(true, "読み込み中...");
        var promise;
        if (useSort) {
          promise = callWrappedApi("api_listItemsSorted", [{
            sortKey: state.sortKey,
            order: state.sortOrder
          }]);
        } else {
          promise = callWrappedApi("api_listItems");
        }

        return promise.then(function(response) {
          state.allItems = extractListItemsFromResponse(response);
          state.selectedById = {};
          updateToolbarOptions(state.allItems);
          applyAndRenderCurrentView();
          setBanner("success", "商品一覧を取得しました。");
        }).catch(function(err) {
          state.allItems = [];
          state.viewItems = [];
          state.selectedById = {};
          updateToolbarOptions([]);
          updateSelectedCount();
          document.getElementById("items-status").textContent = "エラー";
          document.getElementById("content").innerHTML =
            "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(err)) + "</span>" +
            buildApiDebugHtml(err);
          setBanner("error", "商品一覧の取得に失敗しました。");
        }).finally(function() {
          setLoading(false);
        });
      }

      function executeBulkAction() {
        if (state.loading) return;
        var selectedIds = getSelectedIds();
        var action = document.getElementById("bulk-action").value;
        var statusValue = document.getElementById("bulk-status").value;

        if (!selectedIds.length) {
          setBanner("error", "一括操作する行を選択してください。");
          updateBulkUiState();
          return;
        }
        if (!action) {
          setBanner("error", "一括操作を選択してください。");
          return;
        }
        if (action === "updateStatus" && !statusValue) {
          setBanner("error", "変更後ステータスを選択してください。");
          return;
        }

        var confirmInfo = buildBulkConfirmMessage(action, selectedIds.length, statusValue);
        if (!confirmAction(confirmInfo.message)) {
          return;
        }

        setLoading(true, "一括処理中...");
        setBanner("info", confirmInfo.label + "を実行しています。");

        var apiName = "";
        var payload = { itemIds: selectedIds };
        if (action === "updateStatus") {
          apiName = "api_bulkUpdateStatus";
          payload.status = statusValue;
        } else if (action === "recalculate") {
          apiName = "api_bulkRecalculateProfit";
        } else {
          apiName = "api_bulkDisableNetshop";
        }

        callWrappedApi(apiName, [payload]).then(function() {
          setBanner("success", confirmInfo.label + "が完了しました。");
          return loadItemsWithCurrentSort({ forceBaseLoad: false });
        }).catch(function(err) {
          setBanner("error", confirmInfo.label + "に失敗しました: " + resolveErrorMessage(err));
        }).finally(function() {
          setLoading(false);
          updateBulkUiState();
        });
      }

      document.getElementById("reload-items").addEventListener("click", function() {
        if (isAnyBusy()) return;
        setBanner("info", "商品一覧を再取得しています。");
        loadItemsWithCurrentSort({ forceBaseLoad: true });
      });

      document.getElementById("open-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        if (!confirmNavigationIfNeeded("list")) return;
        switchScreen("list");
      });

      document.getElementById("open-create-item").addEventListener("click", function() {
        openCreateScreen();
      });

      document.getElementById("open-dashboard").addEventListener("click", function() {
        openDashboardScreen();
      });

      document.getElementById("dashboard-back-to-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        if (!confirmNavigationIfNeeded("list")) return;
        switchScreen("list");
      });

      document.getElementById("dashboard-reload").addEventListener("click", function() {
        if (isAnyBusy()) return;
        loadDashboard();
      });

      document.getElementById("keyword-search").addEventListener("input", function(event) {
        state.keyword = event.target.value || "";
        applyAndRenderCurrentView();
      });

      document.getElementById("status-filter").addEventListener("change", function(event) {
        state.statusFilter = event.target.value || "";
        applyAndRenderCurrentView();
      });

      document.getElementById("sort-key").addEventListener("change", function(event) {
        state.sortKey = event.target.value || "";
        if (!state.sortKey) {
          applyAndRenderCurrentView();
          return;
        }
        setBanner("info", "並び替えで再取得しています。");
        loadItemsWithCurrentSort({ forceBaseLoad: false });
      });

      document.getElementById("sort-order-toggle").addEventListener("click", function() {
        state.sortOrder = state.sortOrder === "asc" ? "desc" : "asc";
        this.textContent = state.sortOrder === "asc" ? "昇順" : "降順";
        if (!state.sortKey) return;
        setBanner("info", "並び順を変更して再取得しています。");
        loadItemsWithCurrentSort({ forceBaseLoad: false });
      });

      document.getElementById("bulk-action").addEventListener("change", function() {
        updateBulkUiState();
      });

      document.getElementById("bulk-execute").addEventListener("click", function() {
        executeBulkAction();
      });

      document.getElementById("back-to-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        switchScreen("list");
      });

      document.getElementById("open-edit-item").addEventListener("click", function() {
        openEditScreen(state.detailItemId);
      });

      document.getElementById("create-back-to-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        if (!confirmNavigationIfNeeded("list")) return;
        switchScreen("list");
      });

      document.getElementById("create-save-item").addEventListener("click", function() {
        saveNewItem();
      });

      document.getElementById("create-validate-item").addEventListener("click", function() {
        runSavePreValidation("create");
      });

      document.getElementById("create-lookup-zip").addEventListener("click", function() {
        lookupZipForForm("create");
      });

      document.getElementById("create-reset-form").addEventListener("click", function() {
        if (state.createSubmitting) return;
        if (hasCreateFormChanges() && !confirmAction("入力内容をクリアします。よろしいですか？")) return;
        resetCreateForm();
        setInlineMessage("", "");
      });

      document.getElementById("edit-back-to-detail").addEventListener("click", function() {
        if (state.editSubmitting || state.editLoading) return;
        if (hasEditUnsavedChanges() && !confirmAction("編集内容を破棄して詳細へ戻ります。よろしいですか？")) return;
        if (!state.editItemId) {
          switchScreen("list");
          return;
        }
        openDetailById(state.editItemId, { silentSuccessBanner: true });
      });

      document.getElementById("edit-save-item").addEventListener("click", function() {
        saveEditedItem();
      });

      document.getElementById("edit-validate-item").addEventListener("click", function() {
        runSavePreValidation("edit");
      });

      document.getElementById("edit-lookup-zip").addEventListener("click", function() {
        lookupZipForForm("edit");
      });

      document.getElementById("edit-reset-form").addEventListener("click", function() {
        if (state.editSubmitting || state.editLoading) return;
        if (hasEditUnsavedChanges() && !confirmAction("編集内容を初期値に戻します。よろしいですか？")) return;
        resetEditFormToInitial();
        setEditInlineMessage("", "");
      });

      document.getElementById("content").addEventListener("change", function(event) {
        if (state.loading) return;
        var target = event.target;
        if (!target) return;

        if (target.id === "select-all-rows") {
          var checked = !!target.checked;
          state.viewItems.forEach(function(item) {
            var itemId = resolveItemId(item);
            if (!itemId) return;
            state.selectedById[itemId] = checked;
          });
          renderItemsTable(state.viewItems);
          return;
        }

        if (target.classList.contains("row-select")) {
          var itemId = target.getAttribute("data-item-id");
          if (itemId) {
            state.selectedById[itemId] = !!target.checked;
          }
          updateSelectAllState();
          updateSelectedCount();
          updateBulkUiState();
        }
      });

      document.getElementById("content").addEventListener("click", function(event) {
        if (state.loading) return;
        var target = event.target;
        if (!target) return;
        if (target.classList.contains("row-detail-open")) {
          var itemId = target.getAttribute("data-item-id");
          openDetailById(itemId);
        }
      });

      window.addEventListener("hashchange", function() {
        if (state.routeSyncLock) {
          state.routeSyncLock = false;
          return;
        }

        var targetRoute = resolveRouteFromUrl();
        var currentRoute = getCurrentRouteState();
        if (isSameRoute(targetRoute, currentRoute)) return;

        restoreRoute(targetRoute, { skipConfirm: false });
      });

      updateBulkUiState();
      restoreRoute(resolveRouteFromUrl(), { skipConfirm: true });
    </script>
