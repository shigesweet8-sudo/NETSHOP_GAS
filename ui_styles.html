    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --surface: #ffffff;
        --surface-soft: #f9fafb;
        --border: #e5e7eb;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --success: #166534;
        --success-soft: #dcfce7;
        --warning: #9a3412;
        --warning-soft: #ffedd5;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 180px);
        color: var(--text);
      }

      .layout-app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-title {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
      }

      .page-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .page-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .screen-context {
        margin-bottom: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        background: var(--surface);
        font-size: 13px;
        color: var(--muted);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }

      .card-title {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      }

      .btn:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
      }

      .btn-small {
        padding: 6px 10px;
        font-size: 12px;
      }

      .state-banner {
        display: none;
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .state-banner.is-visible {
        display: block;
      }

      .state-banner.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .state-banner.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .state-banner.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .status-line {
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--muted);
      }

      .items-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        align-items: center;
      }

      .toolbar-group {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .toolbar-spacer {
        flex: 1 1 auto;
      }

      .control-input,
      .control-select {
        height: 36px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        font: inherit;
        font-size: 13px;
        min-width: 120px;
        background: #fff;
      }

      .control-input {
        min-width: 220px;
      }

      .selected-count {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
      }

      .select-cell {
        width: 44px;
        text-align: center;
      }

      .action-cell {
        width: 84px;
        text-align: center;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 10px;
        font-size: 13px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f3f4f6;
        font-weight: 700;
      }

      tbody tr:nth-child(even) {
        background: var(--surface-soft);
      }

      .screen-hidden {
        display: none;
      }

      .detail-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: space-between;
        align-items: center;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .detail-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface-soft);
        padding: 10px;
      }

      .detail-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .detail-value {
        font-size: 14px;
        color: var(--text);
        word-break: break-word;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-field label {
        font-size: 13px;
        color: var(--muted);
      }

      .field-inline-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .field-inline-actions .control-input {
        flex: 1 1 auto;
        min-width: 0;
      }

      .field-inline-actions .btn {
        width: auto;
        white-space: nowrap;
      }

      .validation-result {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        display: none;
      }

      .validation-result.is-visible {
        display: block;
      }

      .validation-section + .validation-section {
        margin-top: 10px;
      }

      .validation-title {
        margin: 0 0 6px;
        font-size: 13px;
        font-weight: 700;
      }

      .validation-title.is-error {
        color: var(--danger);
      }

      .validation-title.is-warning {
        color: var(--warning);
      }

      .validation-list {
        margin: 0;
        padding-left: 18px;
      }

      .validation-list li {
        font-size: 12px;
        line-height: 1.5;
      }

      .validation-empty {
        margin: 0;
        font-size: 13px;
        color: var(--success);
      }

      .form-textarea {
        min-height: 88px;
        resize: vertical;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .inline-message {
        margin-top: 12px;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        display: none;
      }

      .inline-message.is-visible {
        display: block;
      }

      .inline-message.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .inline-message.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .inline-message.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .dashboard-block {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        background: var(--surface-soft);
      }

      .dashboard-title {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }

      .kpi-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }

      .kpi-label {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .kpi-value {
        margin: 4px 0 0;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
        }

        .page-actions {
          width: 100%;
        }

        .btn {
          width: 100%;
        }

        .items-toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-group {
          width: 100%;
        }

        .control-input,
        .control-select {
          width: 100%;
        }

        .toolbar-spacer {
          display: none;
        }
      }
    </style>
