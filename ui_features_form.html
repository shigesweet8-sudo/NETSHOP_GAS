    <script>
      function setInlineMessageById(elementId, kind, message) {
        var el = document.getElementById(elementId);
        if (!el) return;
        el.className = "inline-message";
        if (!message) {
          el.textContent = "";
          return;
        }
        el.classList.add("is-visible");
        el.classList.add(kind === "error" ? "is-error" : kind === "success" ? "is-success" : "is-info");
        el.textContent = message;
      }

      function setInlineMessage(kind, message) {
        setInlineMessageById("create-message", kind, message);
      }

      function setEditInlineMessage(kind, message) {
        setInlineMessageById("edit-message", kind, message);
      }

      function getValidationResultElementId(formType) {
        return formType === "edit" ? "edit-validation-result" : "create-validation-result";
      }

      function clearValidationResult(formType) {
        var el = document.getElementById(getValidationResultElementId(formType));
        if (!el) return;
        el.className = "validation-result";
        el.innerHTML = "";
      }

      function normalizeValidationIssues(list) {
        return (Array.isArray(list) ? list : []).map(function(entry, index) {
          if (entry && typeof entry === "object") {
            var code = entry.code != null ? String(entry.code).trim() : "";
            var field = entry.field != null ? String(entry.field).trim() : "";
            var message = entry.message != null ? String(entry.message).trim() : "";
            var text = message;
            if (!text) text = formatStructuredValue(entry);
            if (!text) text = "Issue " + (index + 1);
            return { code: code, field: field, message: text };
          }
          var raw = String(entry == null ? "" : entry).trim();
          return { code: "", field: "", message: raw || ("Issue " + (index + 1)) };
        });
      }

      function extractValidationResult(response) {
        var source = null;
        if (response && response.data && typeof response.data === "object") {
          source = response.data;
        } else if (response && response.error && response.error.details && typeof response.error.details === "object") {
          source = response.error.details;
        } else if (response && typeof response === "object") {
          source = response;
        }

        var errors = normalizeValidationIssues(source && source.errors);
        var warnings = normalizeValidationIssues(source && source.warnings);
        return {
          errors: errors,
          warnings: warnings
        };
      }

      function renderValidationResult(formType, result) {
        var el = document.getElementById(getValidationResultElementId(formType));
        if (!el) return;

        var errors = result && Array.isArray(result.errors) ? result.errors : [];
        var warnings = result && Array.isArray(result.warnings) ? result.warnings : [];
        el.className = "validation-result is-visible";

        if (!errors.length && !warnings.length) {
          el.innerHTML = "<p class=\"validation-empty\">エラー・警告はありません。</p>";
          return;
        }

        var html = "";
        if (errors.length) {
          html += "<div class=\"validation-section\"><p class=\"validation-title is-error\">Errors (" + errors.length + ")</p><ul class=\"validation-list\">";
          errors.forEach(function(issue) {
            var parts = [];
            if (issue.code) parts.push("[" + issue.code + "]");
            if (issue.field) parts.push(issue.field + ":");
            parts.push(issue.message || "");
            html += "<li>" + escapeHtml(parts.join(" ").trim()) + "</li>";
          });
          html += "</ul></div>";
        }
        if (warnings.length) {
          html += "<div class=\"validation-section\"><p class=\"validation-title is-warning\">Warnings (" + warnings.length + ")</p><ul class=\"validation-list\">";
          warnings.forEach(function(issue) {
            var parts = [];
            if (issue.code) parts.push("[" + issue.code + "]");
            if (issue.field) parts.push(issue.field + ":");
            parts.push(issue.message || "");
            html += "<li>" + escapeHtml(parts.join(" ").trim()) + "</li>";
          });
          html += "</ul></div>";
        }
        el.innerHTML = html;
      }

      function runVariationValidation(payload) {
        return runGasApi("api_validateVariation", [payload]).then(function(raw) {
          return normalizeApiEnvelope(raw);
        });
      }

      function runSavePreValidation(formType) {
        var isEdit = formType === "edit";
        if (isEdit && (state.editLoading || state.editSubmitting)) return;
        if (!isEdit && state.createSubmitting) return;

        var messageSetter = isEdit ? setEditInlineMessage : setInlineMessage;
        var itemPayload = isEdit ? collectEditPayload() : collectCreatePayload();
        var requestPayload = {
          mode: isEdit ? "update" : "create",
          item: itemPayload
        };
        if (isEdit) {
          requestPayload.item.id = String(state.editItemId || "").trim();
        }

        messageSetter("info", "保存前バリデーションを実行しています...");
        clearValidationResult(formType);

        runVariationValidation(requestPayload).then(function(response) {
          var parsed = extractValidationResult(response);
          renderValidationResult(formType, parsed);

          if (parsed.errors.length) {
            messageSetter("error", "Errors が見つかりました。内容を修正してから保存してください。");
          } else if (parsed.warnings.length) {
            messageSetter("info", "Warnings のみです。内容を確認したうえで保存できます。");
          } else {
            messageSetter("success", "保存前バリデーションで問題は見つかりませんでした。");
          }
        }).catch(function(err) {
          messageSetter("error", "保存前バリデーションに失敗しました: " + resolveErrorMessage(err));
        });
      }

      function lookupZipForForm(formType) {
        var isEdit = formType === "edit";
        if (isEdit && (state.editLoading || state.editSubmitting)) return;
        if (!isEdit && state.createSubmitting) return;

        var prefix = isEdit ? "edit" : "create";
        var zip = String(document.getElementById(prefix + "-zip").value || "").trim();
        var messageSetter = isEdit ? setEditInlineMessage : setInlineMessage;

        if (!zip) {
          messageSetter("error", "郵便番号を入力してください。");
          return;
        }

        messageSetter("info", "郵便番号から住所を補完しています...");
        callWrappedApi("api_uiLookupZip", [{ zip: zip }]).then(function(response) {
          var data = response && response.data ? response.data : {};
          var pref = String(data.prefecture || "").trim();
          var addressLine = String(data.addressLine || "").trim();
          if (!addressLine) {
            addressLine = String((data.city || "") + (data.town || "")).trim();
          }
          var normalizedZip = String(data.zip || "").trim();

          if (!pref && !addressLine) {
            messageSetter("error", "住所候補が見つかりませんでした。");
            return;
          }

          if (normalizedZip) document.getElementById(prefix + "-zip").value = normalizedZip;
          if (pref) document.getElementById(prefix + "-pref").value = pref;
          if (addressLine) document.getElementById(prefix + "-addr2").value = addressLine;
          messageSetter("success", "住所を補完しました。");
        }).catch(function(err) {
          messageSetter("error", "住所補完に失敗しました: " + resolveErrorMessage(err));
        });
      }

      function setCreateSubmitting(flag) {
        state.createSubmitting = !!flag;
        document.getElementById("create-save-item").disabled = !!flag;
        document.getElementById("create-validate-item").disabled = !!flag;
        document.getElementById("create-lookup-zip").disabled = !!flag;
        document.getElementById("create-reset-form").disabled = !!flag;
        document.getElementById("create-back-to-list").disabled = !!flag;
        refreshGlobalActionState();
      }

      function refreshEditButtons() {
        var disabled = !!state.editLoading || !!state.editSubmitting;
        document.getElementById("edit-save-item").disabled = disabled;
        document.getElementById("edit-validate-item").disabled = disabled;
        document.getElementById("edit-lookup-zip").disabled = disabled;
        document.getElementById("edit-delete-item").disabled = disabled;
        document.getElementById("edit-reset-form").disabled = disabled;
        document.getElementById("edit-back-to-detail").disabled = !!state.editSubmitting;
        refreshGlobalActionState();
      }

      function setEditLoading(flag) {
        state.editLoading = !!flag;
        refreshEditButtons();
      }

      function setEditSubmitting(flag) {
        state.editSubmitting = !!flag;
        refreshEditButtons();
      }

      function resetCreateForm() {
        document.getElementById("create-id-preview").value = "";
        document.getElementById("create-date").value = "";
        document.getElementById("create-product-reg-date").value = "";
        document.getElementById("create-item-name").value = "";
        document.getElementById("create-cost").value = "";
        document.getElementById("create-storage").value = "";
        document.getElementById("create-qty").value = "";
        document.getElementById("create-list-price").value = "";
        document.getElementById("create-negotiated-price").value = "";
        document.getElementById("create-price-final").value = "";
        document.getElementById("create-fee").value = "";
        document.getElementById("create-shipping").value = "";
        document.getElementById("create-ship-from").value = "";
        document.getElementById("create-customer").value = "";
        document.getElementById("create-carrier").value = "";
        document.getElementById("create-tracking").value = "";
        document.getElementById("create-zip").value = "";
        document.getElementById("create-pref").value = "";
        document.getElementById("create-addr2").value = "";
        document.getElementById("create-addr3").value = "";
        document.getElementById("create-phone").value = "";
        document.getElementById("create-memo").value = "";
        document.getElementById("create-status").value = "";
        document.getElementById("create-shop").value = "";
        clearValidationResult("create");
        applyStatusPlanToForm("create");
      }

      function populateCreateSelect(selectId, options, placeholder) {
        var select = document.getElementById(selectId);
        var previousValue = select.value || "";
        var list = toOptionObjects(options);
        select.innerHTML = "<option value=\"\">" + escapeHtml(placeholder || "選択してください") + "</option>" + list.map(function(option) {
          return "<option value=\"" + escapeHtml(option.value) + "\">" + escapeHtml(option.label) + "</option>";
        }).join("");
        select.value = list.some(function(option) { return option.value === previousValue; }) ? previousValue : "";
      }

      function ensureSelectHasValue(selectId, value, fallbackLabel) {
        var select = document.getElementById(selectId);
        if (!select) return;
        var text = String(value == null ? "" : value).trim();
        if (!text) {
          select.value = "";
          return;
        }
        var hasOption = Array.prototype.some.call(select.options, function(option) {
          return String(option.value) === text;
        });
        if (!hasOption) {
          var option = document.createElement("option");
          option.value = text;
          option.textContent = fallbackLabel || text;
          select.appendChild(option);
        }
        select.value = text;
      }

      var FORM_FIELD_LABELS = {
        status: "ステータス",
        id: "管理ID",
        date: "日にち",
        productRegDate: "商品登録日",
        shop: "ショップ",
        itemName: "商品名",
        cost: "仕入れ値",
        storage: "保管場所",
        qty: "個数",
        listPrice: "出品金額",
        negotiatedPrice: "交渉金額",
        priceFinal: "決済金額",
        fee: "サイト利用料",
        shipping: "配送料",
        shipFrom: "配送元",
        customer: "購入者名",
        carrier: "配送業者",
        tracking: "追跡番号",
        zip: "郵便番号",
        pref: "都道府県",
        addr2: "住所2(地番)",
        addr3: "住所3(建物名)",
        phone: "電話番号",
        memo: "備考"
      };

      var STATUS_FIELD_PLANS = {
        "商品登録": {
          summary: "商品登録時点で必要な基本情報を入力します。",
          visible: ["status", "id", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty", "memo"],
          required: ["status", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty"],
          recommended: ["memo"]
        },
        "出品中": {
          summary: "商品登録の基本情報に加えて、出品金額(K) を入力します。",
          visible: ["status", "id", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty", "listPrice", "memo"],
          required: ["status", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty", "listPrice"],
          recommended: ["memo"]
        },
        "値段交渉中": {
          summary: "交渉中として交渉金額(L) を追記します。",
          visible: ["status", "id", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty", "listPrice", "negotiatedPrice", "memo"],
          required: ["status", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty", "listPrice", "negotiatedPrice"],
          recommended: ["memo"]
        },
        "決済完了": {
          summary: "決済完了として M:決済金額、N:サイト利用料、O:配送料 を入力します。",
          visible: ["status", "id", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty", "listPrice", "negotiatedPrice", "priceFinal", "fee", "shipping", "memo"],
          required: ["status", "date", "productRegDate", "shop", "itemName", "cost", "storage", "qty", "listPrice", "negotiatedPrice", "priceFinal", "fee", "shipping"],
          recommended: ["memo"]
        },
        "発送準備中": {
          summary: "配送準備として配送元・購入者・配送情報・住所・電話番号を入力します。",
          visible: ["status", "shipFrom", "customer", "carrier", "tracking", "zip", "pref", "addr2", "addr3", "phone", "memo"],
          required: ["status", "shipFrom", "customer", "carrier", "tracking", "zip", "pref", "addr2", "addr3", "phone"],
          recommended: ["memo"]
        },
        "発送完了": {
          summary: "発送完了は完了系ステータスとして塗りつぶし表示します。",
          visible: ["status", "tracking", "memo"],
          required: ["status"],
          recommended: ["tracking", "memo"]
        },
        "取引完了": {
          summary: "取引完了は完了系ステータスとして塗りつぶし表示します。",
          visible: ["status", "memo"],
          required: ["status"],
          recommended: ["memo"]
        },
        "キャンセル": {
          summary: "キャンセルはクローズ系ステータスとして塗りつぶし表示します。",
          visible: ["status", "memo"],
          required: ["status"],
          recommended: ["memo"]
        }
      };

      function getStatusPlanForValue(statusValue) {
        var key = String(statusValue || "").trim();
        return STATUS_FIELD_PLANS[key] || null;
      }

      function getFormInputId(formType, fieldKey) {
        var prefix = formType === "edit" ? "edit" : "create";
        var map = {
          status: prefix + "-status",
          id: prefix + "-id-preview",
          date: prefix + "-date",
          productRegDate: prefix + "-product-reg-date",
          shop: prefix + "-shop",
          itemName: prefix + "-item-name",
          cost: prefix + "-cost",
          storage: prefix + "-storage",
          qty: prefix + "-qty",
          listPrice: prefix + "-list-price",
          negotiatedPrice: prefix + "-negotiated-price",
          priceFinal: prefix + "-price-final",
          fee: prefix + "-fee",
          shipping: prefix + "-shipping",
          shipFrom: prefix + "-ship-from",
          customer: prefix + "-customer",
          carrier: prefix + "-carrier",
          tracking: prefix + "-tracking",
          zip: prefix + "-zip",
          pref: prefix + "-pref",
          addr2: prefix + "-addr2",
          addr3: prefix + "-addr3",
          phone: prefix + "-phone",
          memo: prefix + "-memo"
        };
        return map[fieldKey] || "";
      }

      function clearStatusPlanHighlights(formType) {
        Object.keys(FORM_FIELD_LABELS).forEach(function(fieldKey) {
          var input = document.getElementById(getFormInputId(formType, fieldKey));
          if (!input || !input.closest) return;
          var container = input.closest(".form-field");
          if (!container) return;
          container.classList.remove("is-highlighted", "is-required", "is-recommended", "is-missing", "is-complete-status", "is-closed-status");
        });
      }

      function setCreateFieldsVisibleByStatus(statusValue) {
        var plan = getStatusPlanForValue(statusValue);
        var visibleMap = {};
        var alwaysVisible = {
          status: true
        };

        if (plan && Array.isArray(plan.visible)) {
          plan.visible.forEach(function(fieldKey) {
            visibleMap[fieldKey] = true;
          });
        }
        Object.keys(alwaysVisible).forEach(function(fieldKey) {
          visibleMap[fieldKey] = true;
        });

        Object.keys(FORM_FIELD_LABELS).forEach(function(fieldKey) {
          var input = document.getElementById(getFormInputId("create", fieldKey));
          if (!input || !input.closest) return;
          var container = input.closest(".form-field");
          if (!container) return;
          container.classList.toggle("is-hidden-by-status", !visibleMap[fieldKey]);
        });
      }

      function markStatusPlanField(formType, fieldKey, className) {
        var input = document.getElementById(getFormInputId(formType, fieldKey));
        if (!input || !input.closest) return;
        var container = input.closest(".form-field");
        if (!container) return;
        container.classList.add("is-highlighted");
        container.classList.add(className);
      }

      function renderStatusPlanGuide(formType, statusValue) {
        var planEl = document.getElementById(formType === "edit" ? "edit-status-plan" : "create-status-plan");
        if (!planEl) return;
        var plan = getStatusPlanForValue(statusValue);
        if (!plan) {
          planEl.className = "status-plan is-visible";
          planEl.innerHTML = "<p class=\"status-plan-text\">ステータスを選択すると、入力推奨項目を表示します。</p>";
          return;
        }

        var chips = [];
        (plan.required || []).forEach(function(fieldKey) {
          chips.push("<span class=\"status-plan-chip is-required\">必須: " + escapeHtml(FORM_FIELD_LABELS[fieldKey] || fieldKey) + "</span>");
        });
        (plan.recommended || []).forEach(function(fieldKey) {
          chips.push("<span class=\"status-plan-chip is-recommended\">推奨: " + escapeHtml(FORM_FIELD_LABELS[fieldKey] || fieldKey) + "</span>");
        });

        var planClassName = "status-plan is-visible";
        if (statusValue === "発送完了" || statusValue === "取引完了") {
          planClassName += " is-complete";
        } else if (statusValue === "キャンセル") {
          planClassName += " is-closed";
        }
        planEl.className = planClassName;
        planEl.innerHTML =
          "<p class=\"status-plan-title\">入力計画: " + escapeHtml(String(statusValue).trim()) + "</p>" +
          "<p class=\"status-plan-text\">" + escapeHtml(plan.summary || "") + "</p>" +
          "<div class=\"status-plan-list\">" + chips.join("") + "</div>";
      }

      function isFieldBlankForWarning(fieldKey, value) {
        if (fieldKey === "qty") {
          return String(value == null ? "" : value).trim() === "";
        }
        return String(value == null ? "" : value).trim() === "";
      }

      function updateMissingFieldWarnings(formType) {
        var plan = getStatusPlanForValue(
          (document.getElementById(formType === "edit" ? "edit-status" : "create-status") || {}).value
        );
        clearStatusMissingWarnings(formType);
        if (!plan || !Array.isArray(plan.required)) return;
        var payload = formType === "edit" ? collectEditPayload() : collectCreatePayload();
        plan.required.forEach(function(fieldKey) {
          if (!isFieldBlankForWarning(fieldKey, payload[fieldKey])) return;
          var input = document.getElementById(getFormInputId(formType, fieldKey));
          if (!input || !input.closest) return;
          var container = input.closest(".form-field");
          if (!container) return;
          container.classList.add("is-missing");
        });
      }

      function clearStatusMissingWarnings(formType) {
        Object.keys(FORM_FIELD_LABELS).forEach(function(fieldKey) {
          var input = document.getElementById(getFormInputId(formType, fieldKey));
          if (!input || !input.closest) return;
          var container = input.closest(".form-field");
          if (!container) return;
          container.classList.remove("is-missing");
        });
      }

      function getTodayInputDate_() {
        var date = new Date();
        var yyyy = date.getFullYear();
        var mm = String(date.getMonth() + 1).padStart(2, "0");
        var dd = String(date.getDate()).padStart(2, "0");
        return yyyy + "-" + mm + "-" + dd;
      }

      function syncCreateAutoFields() {
        var dateEl = document.getElementById("create-date");
        var regDateEl = document.getElementById("create-product-reg-date");
        var shopEl = document.getElementById("create-shop");
        var idPreviewEl = document.getElementById("create-id-preview");
        var statusValue = String((document.getElementById("create-status").value || "")).trim();
        var today = getTodayInputDate_();
        if (dateEl && !String(dateEl.value || "").trim()) {
          dateEl.value = today;
        }
        if (regDateEl && (!String(regDateEl.value || "").trim() || statusValue === "商品登録")) {
          regDateEl.value = today;
        }
        if (idPreviewEl) {
          var shopText = String(shopEl && shopEl.value || "").trim();
          idPreviewEl.value = shopText
            ? "保存時に自動採番 (" + shopText + ")"
            : "保存時に自動採番";
        }
      }

      function applyStatusPlanToForm(formType) {
        var select = document.getElementById(formType === "edit" ? "edit-status" : "create-status");
        var statusValue = select ? select.value : "";
        var plan = getStatusPlanForValue(statusValue);
        clearStatusPlanHighlights(formType);
        if (formType === "create") {
          setCreateFieldsVisibleByStatus(statusValue);
        }
        if (statusValue === "発送完了" || statusValue === "取引完了") {
          markStatusPlanField(formType, "status", "is-complete-status");
        } else if (statusValue === "キャンセル") {
          markStatusPlanField(formType, "status", "is-closed-status");
        }
        renderStatusPlanGuide(formType, statusValue);
        if (formType === "create") {
          syncCreateAutoFields();
        }
        if (!plan) {
          updateMissingFieldWarnings(formType);
          return;
        }
        (plan.required || []).forEach(function(fieldKey) {
          markStatusPlanField(formType, fieldKey, "is-required");
        });
        (plan.recommended || []).forEach(function(fieldKey) {
          markStatusPlanField(formType, fieldKey, "is-recommended");
        });
        updateMissingFieldWarnings(formType);
      }

      function applyMasterOptionsToForms(statusOptions, shopOptions) {
        state.masterStatusOptions = toOptionObjects(statusOptions);
        state.masterShopOptions = toOptionObjects(shopOptions);
        populateCreateSelect("create-status", state.masterStatusOptions, "ステータスを選択");
        populateCreateSelect("create-shop", state.masterShopOptions, "ショップを選択");
        populateCreateSelect("edit-status", state.masterStatusOptions, "ステータスを選択");
        populateCreateSelect("edit-shop", state.masterShopOptions, "ショップを選択");
        populateCreateSelect("create-ship-from", state.masterShipFromOptions, "配送元を選択");
        populateCreateSelect("create-carrier", state.masterCarrierOptions, "配送業者を選択");
        populateCreateSelect("edit-ship-from", state.masterShipFromOptions, "配送元を選択");
        populateCreateSelect("edit-carrier", state.masterCarrierOptions, "配送業者を選択");
        applyStatusPlanToForm("create");
        applyStatusPlanToForm("edit");
      }

      function loadCreateMastersIfNeeded(forceReload, messageElementId) {
        var messageId = messageElementId || "create-message";
        if (state.mastersLoaded && !forceReload) {
          applyMasterOptionsToForms(state.masterStatusOptions, state.masterShopOptions);
          return Promise.resolve();
        }

        setInlineMessageById(messageId, "info", "候補を取得しています...");
        return callWrappedApi("api_getMasters", [{
          masterTypes: ["statuses", "shops", "shipFroms", "carriers"]
        }]).then(function(response) {
          var statusOptions = extractMasterOptions(response, ["statuses", "status", "ステータス"]);
          var shopOptions = extractMasterOptions(response, ["shops", "shop", "ショップ"]);
          state.masterShipFromOptions = extractMasterOptions(response, ["shipFroms", "shipFrom", "配送元"]);
          state.masterCarrierOptions = extractMasterOptions(response, ["carriers", "carrier", "配送業者"]);
          applyMasterOptionsToForms(statusOptions, shopOptions);
          state.mastersLoaded = true;
          setInlineMessageById(messageId, "", "");
        }).catch(function(err) {
          state.masterShipFromOptions = [];
          state.masterCarrierOptions = [];
          applyMasterOptionsToForms([], []);
          setInlineMessageById(messageId, "error", "候補取得に失敗しました: " + resolveErrorMessage(err));
          throw err;
        });
      }

      function collectCreatePayload() {
        return {
          status: String(document.getElementById("create-status").value || "").trim(),
          date: String(document.getElementById("create-date").value || "").trim(),
          productRegDate: String(document.getElementById("create-product-reg-date").value || "").trim(),
          shop: String(document.getElementById("create-shop").value || "").trim(),

      function saveNewItem() {
        if (state.createSubmitting) return;
        setCreateSubmitting(true);
        setInlineMessage("info", "保存しています...");
        var payload = collectCreatePayload();

        callWrappedApi("api_createItem", [payload]).then(function(response) {
          var createdId = response && response.data && response.data.id ? String(response.data.id) : "";
          setInlineMessage("success", "保存に成功しました" + (createdId ? " (管理ID: " + createdId + ")" : "") + "。");
          setBanner("success", "新規商品を登録しました。");
          resetCreateForm();
          switchScreen("list");
          loadItemsWithCurrentSort({ forceBaseLoad: true });
        }).catch(function(err) {
          setInlineMessage("error", "保存に失敗しました: " + resolveErrorMessage(err));
          setBanner("error", "新規商品の保存に失敗しました。");
        }).finally(function() {
          setCreateSubmitting(false);
        });
      }

      function openCreateScreen(options) {
        var opts = options && typeof options === "object" ? options : {};
        if (!opts.ignoreBusy && isAnyBusy()) return;
        if (!opts.skipConfirm && !confirmNavigationIfNeeded("create")) return;
        setInlineMessage("", "");
        clearValidationResult("create");
        switchScreen("create");
        applyStatusPlanToForm("create");
        loadCreateMastersIfNeeded(false, "create-message").catch(function() {});
      }
    </script>
