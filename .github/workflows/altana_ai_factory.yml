name: ALTANA AI FACTORY

on:
  issues:
    types: [opened]
  push:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Save Issue body to file
        run: |
          cat <<'EOF' > issue_body.md
          ${{ github.event.issue.body }}
          EOF

      - name: Send Issue to OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request
          issue_body = pathlib.Path("issue_body.md").read_text(encoding="utf-8")
          api_key = os.environ["OPENAI_API_KEY"]
          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": "You are an AI architect inside ALTANA FACTORY. Respond with CODEX_INSTRUCTION: <instruction>."},
                  {"role": "user", "content": issue_body}
              ]
          }
          req = urllib.request.Request("https://api.openai.com/v1/chat/completions", data=json.dumps(payload).encode("utf-8"), headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}, method="POST")
          with urllib.request.urlopen(req) as res:
              pathlib.Path("openai_response.json").write_text(res.read().decode("utf-8"), encoding="utf-8")
          PY

      - name: Extract Codex instruction
        run: |
          python - <<'PY'
          import json, pathlib, re
          data = json.loads(pathlib.Path("openai_response.json").read_text(encoding="utf-8"))
          content = data["choices"][0]["message"]["content"].strip()
          instruction = re.search(r"(?s)CODEX_INSTRUCTION:\s*(.*)$", content)
          pathlib.Path("codex_instruction.md").write_text((instruction.group(1) if instruction else content) + "\n", encoding="utf-8")
          PY

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex implementation
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd "$GITHUB_WORKSPACE"
          codex exec workspace-write "$(cat codex_instruction.md)"

      - name: Commit and push AI changes
        run: |
          git config user.name "ALTANA-AI-BOT"
          git config user.email "ai@altana.dev"
          branch_name="feature/issue-${{ github.event.issue.number }}"
          git checkout -b "$branch_name"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "AI: implement issue #${{ github.event.issue.number }}"
            git push origin "$branch_name"
          fi
