name: ALTANA AI FACTORY

on:
  issues:
    types: [opened]
  push:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Issue metadata
        run: |
          echo "Issue Number: ${{ github.event.issue.number }}"
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue User: ${{ github.event.issue.user.login }}"

      - name: Save Issue body to file
        run: |
          cat <<'EOF' > issue_body.md
          ${{ github.event.issue.body }}
          EOF

      - name: Print Issue body
        run: |
          echo "===== ISSUE BODY START ====="
          cat issue_body.md
          echo "===== ISSUE BODY END ====="

      - name: Send Issue to OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          issue_body = pathlib.Path("issue_body.md").read_text(encoding="utf-8")
          api_key = os.environ["OPENAI_API_KEY"]

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {
                      "role": "system", 
                      "content": (
                          "You are a Senior Lead Developer. Your output is a direct instruction for a file-writing tool.\n\n"
                          "1. Analyze the Issue and decide MODE: DIRECT or PLAN.\n"
                          "2. In 'CODEX_INSTRUCTION', you MUST provide the COMPLETE source code of the target file with all changes applied.\n"
                          "3. NEVER output partial code, snippets, or explanations. NEVER use '...'.\n"
                          "4. You MUST output the entire file from the first line to the last line.\n\n"
                          "FORMAT:\n"
                          "File: <path>\n"
                          "```\n"
                          "<the entire file content>\n"
                          "```\n"
                          "No summary. No prose. Just the full file content."
                      )
                  },
                  {"role": "user", "content": issue_body}
              ]
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {api_key}",
              },
              method="POST",
          )

          with urllib.request.urlopen(req) as res:
              body = res.read().decode("utf-8")
              pathlib.Path("openai_response.json").write_text(body, encoding="utf-8")
              print(body)
          PY

      - name: Extract Codex instruction
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          data = json.loads(pathlib.Path("openai_response.json").read_text(encoding="utf-8"))
          content = data["choices"][0]["message"]["content"].strip()

          tasks_match = re.search(r"(?s)TASKS:\s*(.*?)\n\s*CODEX_INSTRUCTION:", content)
          if tasks_match:
              pathlib.Path("issue_tasks.md").write_text(tasks_match.group(1).strip() + "\n", encoding="utf-8")

          instruction_match = re.search(r"(?s)CODEX_INSTRUCTION:\s*(.*)$", content)
          instruction = instruction_match.group(1).strip() if instruction_match else content

          pathlib.Path("codex_instruction.md").write_text(instruction + "\n", encoding="utf-8")
          print(content)
          PY

      - name: Create work branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch_name="feature/issue-${{ github.event.issue.number }}"
          git checkout -b "$branch_name"
          git push origin "$branch_name"

      - name: Configure AI Git author
        run: |
          git config user.name "ALTANA-AI-BOT"
          git config user.email "ai@altana.dev"

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex

      - name: Run Codex implementation
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
       run: |
          cd "$GITHUB_WORKSPACE"
          codex exec --sandbox workspace-write --prompt "$(cat codex_instruction.md)"
      - name: Generate implementation diff
        id: implementation_diff
        run: |
          git add -A
          diff_path="$RUNNER_TEMP/implementation.diff"
          git diff --cached --binary --no-color > "$diff_path"
          echo "diff_path=$diff_path" >> "$GITHUB_OUTPUT"

      - name: Review implementation diff
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_PATH: ${{ steps.implementation_diff.outputs.diff_path }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          diff_text = pathlib.Path(os.environ["DIFF_PATH"]).read_text(encoding="utf-8")
          api_key = os.environ["OPENAI_API_KEY"]

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {
                      "role": "system",
                      "content": "You are a code reviewer. Review the provided git diff and return concise findings."
                  },
                  {
                      "role": "user",
                      "content": diff_text
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {api_key}",
              },
              method="POST",
          )

          with urllib.request.urlopen(req) as res:
              body = res.read().decode("utf-8")
              pathlib.Path("review_result.json").write_text(body, encoding="utf-8")
              print(body)
          PY

      - name: Create Japanese review summary
        env:
          DIFF_PATH: ${{ steps.implementation_diff.outputs.diff_path }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re

          review_data = json.loads(pathlib.Path("review_result.json").read_text(encoding="utf-8"))
          content = review_data["choices"][0]["message"]["content"].strip()
          diff_text = pathlib.Path(os.environ["DIFF_PATH"]).read_text(encoding="utf-8")
          issue_title = os.environ["ISSUE_TITLE"].strip()

          changed_files = []
          for line in diff_text.splitlines():
              if line.startswith("+++ b/"):
                  path = line[6:].strip()
                  if path != "/dev/null" and path not in changed_files:
                      changed_files.append(path)
          changed_files_text = ", ".join(changed_files[:5]) if changed_files else "なし"
          if len(changed_files) > 5:
              changed_files_text += f" ほか{len(changed_files) - 5}件"

          def extract_first(patterns, default=""):
              for pattern in patterns:
                  match = re.search(pattern, content, re.IGNORECASE | re.MULTILINE)
                  if match:
                      value = match.group(1).strip()
                      if value:
                          return value
              return default

          risk_level = extract_first([
              r"危険度\s*[:：]\s*(安全|低|中|高|危険|重大)",
              r"リスク\s*[:：]\s*(安全|低|中|高|危険|重大)",
              r"severity\s*[:：]\s*(safe|low|medium|high|critical)",
          ])

          risk_map = {
              "safe": "安全",
              "low": "低",
              "medium": "中",
              "high": "高",
              "critical": "重大",
          }
          risk_level = risk_map.get(risk_level.lower(), risk_level) if risk_level else ""
          if not risk_level:
              if re.search(r"重大|critical", content, re.IGNORECASE):
                  risk_level = "重大"
              elif re.search(r"危険", content, re.IGNORECASE):
                  risk_level = "危険"
              elif re.search(r"\bhigh\b|高", content, re.IGNORECASE):
                  risk_level = "高"
              elif re.search(r"\bmedium\b|中", content, re.IGNORECASE):
                  risk_level = "中"
              elif re.search(r"\blow\b|低", content, re.IGNORECASE):
                  risk_level = "低"
              else:
                  risk_level = "安全"

          is_danger = risk_level in {"高", "危険", "重大"}
          final_action = "MERGE STOP" if is_danger else ("要確認" if risk_level == "中" else "Merge OK")

          issue_line = extract_first([
              r"Issue\s*[:：]\s*(.+)",
              r"issue title\s*[:：]\s*(.+)",
              r"タイトル\s*[:：]\s*(.+)",
          ], issue_title) or issue_title

          problem = extract_first([
              r"問題\s*[:：]\s*(.+)",
              r"finding\s*[:：]\s*(.+)",
              r"summary\s*[:：]\s*(.+)",
          ], "要修正の可能性があります")
          location = extract_first([
              r"問題箇所\s*[:：]\s*(.+)",
              r"location\s*[:：]\s*(.+)",
              r"file\s*[:：]\s*(.+)",
          ], changed_files[0] if changed_files else "不明")
          fix_direction = extract_first([
              r"修正方向\s*[:：]\s*(.+)",
              r"recommendation\s*[:：]\s*(.+)",
              r"action\s*[:：]\s*(.+)",
          ], "レビュー指摘箇所を修正してください")

          if is_danger:
              summary = "\n".join([
                  "🚨 ALTANA AI FACTORY REVIEW",
                  "",
                  "Issue",
                  issue_line,
                  "",
                  "変更ファイル",
                  changed_files_text,
                  "",
                  "危険度",
                  risk_level,
                  "",
                  "判定",
                  final_action,
                  "",
                  "問題",
                  problem,
                  "",
                  "問題箇所",
                  location,
                  "",
                  "修正方向",
                  fix_direction,
              ])
          else:
              summary = "\n".join([
                  "🤖 ALTANA AI FACTORY REVIEW",
                  "",
                  "Issue",
                  issue_line,
                  "",
                  "変更ファイル",
                  changed_files_text,
                  "",
                  "危険度",
                  risk_level,
                  "",
                  "判定",
                  final_action,
              ])

          pathlib.Path("review_summary_ja.txt").write_text(summary + "\n", encoding="utf-8")
          print(summary)
          PY

      - name: Check review severity
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          data = json.loads(pathlib.Path("review_result.json").read_text(encoding="utf-8"))
          content = data["choices"][0]["message"]["content"]
          print(content)

          if "重大" in content or "高" in content:
              sys.exit(1)
          PY

      - name: Send review summary to Slack
        if: ${{ always() }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          if not os.environ.get("SLACK_WEBHOOK_URL"):
              print("SLACK_WEBHOOK_URL is empty. Skip Slack notification.")
              raise SystemExit(0)

          text = pathlib.Path("review_summary_ja.txt").read_text(encoding="utf-8").strip()
          payload = json.dumps({"text": text}).encode("utf-8")

          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(req) as res:
              print(res.read().decode("utf-8"))
          PY

      - name: Commit and push AI changes
        run: |
          branch_name="feature/issue-${{ github.event.issue.number }}"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "AI: implement issue #${{ github.event.issue.number }}"
            git push origin "$branch_name"
          fi

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install gh -y

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch_name="feature/issue-${{ github.event.issue.number }}"
          if gh pr view "$branch_name" --json url >/dev/null 2>&1; then
            echo "Pull request already exists for $branch_name"
          else
            gh pr create \
              --base master \
              --head "$branch_name" \
              --title "AI: implement issue #${{ github.event.issue.number }}" \
              --body "AI implementation for issue #${{ github.event.issue.number }}"
          fi
