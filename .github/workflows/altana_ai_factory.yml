name: ALTANA AI FACTORY

on:
  issues:
    types: [opened]
  push:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Save Issue body
        run: echo "${{ github.event.issue.body }}" > issue_body.md

      - name: GPT Architect Layer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request, re
          api_key = os.environ["OPENAI_API_KEY"]
          body = pathlib.Path("issue_body.md").read_text(encoding="utf-8")
          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": "You are an AI architect. Respond ONLY with the instruction for Codex after 'CODEX_INSTRUCTION:' tag."},
                  {"role": "user", "content": body}
              ]
          }
          req = urllib.request.Request("https://api.openai.com/v1/chat/completions", data=json.dumps(payload).encode("utf-8"), headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}, method="POST")
          with urllib.request.urlopen(req) as res:
              content = json.loads(res.read())["choices"][0]["message"]["content"]
              inst = re.search(r"(?s)CODEX_INSTRUCTION:\s*(.*)$", content)
              pathlib.Path("codex_instruction.md").write_text(inst.group(1) if inst else content)
          PY

      - name: Codex Engineer Layer
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npm install -g @openai/codex
          # 修正：存在しない--prompt-fileを廃止し、正しい標準入力形式に変更
          cat codex_instruction.md | codex exec workspace-write

      - name: AI Review Layer (日本語強制)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git add -A
          git diff --cached > diff.txt
          python - <<'PY'
          import json, os, pathlib, urllib.request
          api_key = os.environ["OPENAI_API_KEY"]
          diff = pathlib.Path("diff.txt").read_text(encoding="utf-8")
          payload = {"model": "gpt-4o-mini", "messages": [{"role": "system", "content": "必ず日本語でレビューしてください。"}, {"role": "user", "content": diff}]}
          req = urllib.request.Request("https://api.openai.com/v1/chat/completions", data=json.dumps(payload).encode("utf-8"), headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}, method="POST")
          with urllib.request.urlopen(req) as res:
              pathlib.Path("rv.md").write_text(json.loads(res.read())["choices"][0]["message"]["content"])
          PY

      - name: Pipeline & PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "AI-BOT"
          git config user.email "ai@altana.dev"
          branch="feat-${{ github.event.issue.number }}"
          git checkout -b "$branch"
          git commit -m "AI implementation"
          git push origin "$branch"
          gh pr create --title "AI: Implement #${{ github.event.issue.number }}" --body-file rv.md --head "$branch" --base master || echo "PR exists"

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request
          wh = os.environ.get("SLACK_WEBHOOK_URL")
          if wh and pathlib.Path("rv.md").exists():
            txt = pathlib.Path("rv.md").read_text()
            urllib.request.urlopen(urllib.request.Request(wh, data=json.dumps({"text":f"レビュー結果:\n{txt}"}).encode(), headers={"Content-Type":"application/json"}, method="POST"))
          PY
