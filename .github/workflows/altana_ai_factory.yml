name: ALTANA AI FACTORY

on:
  issues:
    types: [opened]
  push:
  pull_request:

permissions:
  contents: write

jobs:
  ai-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Issue metadata
        run: |
          echo "Issue Number: ${{ github.event.issue.number }}"
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue User: ${{ github.event.issue.user.login }}"

      - name: Save Issue body to file
        run: |
          cat <<'EOF' > issue_body.md
          ${{ github.event.issue.body }}
          EOF

      - name: Print Issue body
        run: |
          echo "===== ISSUE BODY START ====="
          cat issue_body.md
          echo "===== ISSUE BODY END ====="

      - name: Send Issue to OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          issue_body = pathlib.Path("issue_body.md").read_text(encoding="utf-8")
          api_key = os.environ["OPENAI_API_KEY"]

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": "You are an AI architect inside ALTANA FACTORY. Your job is to read a GitHub Issue and convert it into precise implementation instructions for Codex. Analyze the Issue and produce structured instructions including: development objective, background, target files, implementation steps, completion criteria, and test procedure. The output must be clear and actionable so Codex can implement code changes. Do not answer casually. Always produce structured instructions."},
                  {"role": "user", "content": issue_body}
              ]
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {api_key}",
              },
              method="POST",
          )

          with urllib.request.urlopen(req) as res:
              body = res.read().decode("utf-8")
              pathlib.Path("openai_response.json").write_text(body, encoding="utf-8")
              print(body)
          PY
      - name: Extract Codex instruction
        run: |
          python - <<'PY'
          import json
          import pathlib

          data = json.loads(pathlib.Path("openai_response.json").read_text(encoding="utf-8"))
          content = data["choices"][0]["message"]["content"]

          pathlib.Path("codex_instruction.md").write_text(content, encoding="utf-8")

          print("===== CODEX INSTRUCTION =====")
          print(content)
          PY
      - name: Create work branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch_name="feature/issue-${{ github.event.issue.number }}"
          git checkout -b "$branch_name"
          git push origin "$branch_name"
      - name: Configure AI Git author
        run: |
          git config user.name "ALTANA-AI-BOT"
          git config user.email "ai@altana.dev"
      - name: Run Codex implementation
        run: |
          cd "$GITHUB_WORKSPACE"
          codex exec --sandbox workspace-write --approval never "$(cat codex_instruction.md)"
      - name: Commit and push AI changes
        run: |
          branch_name="feature/issue-${{ github.event.issue.number }}"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "AI: implement issue #${{ github.event.issue.number }}"
            git push origin "$branch_name"
          fi
      - name: Upload AI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-artifacts
          path: |
            openai_response.json
            codex_instruction.md

  python-tests:
    if: github.event_name != 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pipeline tests
        run: pytest test_pipeline.py


