name: ALTANA AI FACTORY

on:
  issues:
    types: [opened]
  push:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Issue metadata
        run: |
          echo "Issue Number: ${{ github.event.issue.number }}"
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue User: ${{ github.event.issue.user.login }}"

      - name: Save Issue body to file
        run: |
          cat <<'EOF' > issue_body.md
          ${{ github.event.issue.body }}
          EOF

      - name: Print Issue body
        run: |
          echo "===== ISSUE BODY START ====="
          cat issue_body.md
          echo "===== ISSUE BODY END ====="

      - name: Send Issue to OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python scripts/gpt/issue_to_instruction.py

      - name: Create work branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          pwsh -File scripts/codex/run_codex_implementation.ps1 -Step create-work-branch

      - name: Configure AI Git author
        run: |
          pwsh -File scripts/codex/run_codex_implementation.ps1 -Step configure-ai-git-author

      - name: Install Codex CLI
        run: |
          pwsh -File scripts/codex/run_codex_implementation.ps1 -Step install-codex-cli

      - name: Run Codex implementation
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pwsh -File scripts/codex/run_codex_implementation.ps1 -Step run-codex-implementation

      - name: Generate implementation diff
        id: implementation_diff
        run: |
          pwsh -File scripts/codex/run_codex_implementation.ps1 -Step generate-implementation-diff

      - name: Review implementation diff
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_PATH: ${{ steps.implementation_diff.outputs.diff_path }}
        run: |
          pwsh -File scripts/review/run_review.ps1

      - name: Generate review artifacts
        env:
          DIFF_PATH: ${{ steps.implementation_diff.outputs.diff_path }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python scripts/review/generate_review_artifacts.py

      - name: Check review severity
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          data = json.loads(pathlib.Path("review_status.json").read_text(encoding="utf-8"))
          print(json.dumps(data, ensure_ascii=False, indent=2))
          if data["status"] not in {"OK", "SPEC_OK"}:
              sys.exit(1)
          PY
      - name: Send review summary to Slack
        if: ${{ always() }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          pwsh -File scripts/slack/send_slack_notification.ps1

      - name: Commit and push AI changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          pwsh -File scripts/git/run_git_commit_push.ps1
      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install gh -y

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch_name="feature/issue-${{ github.event.issue.number }}"
          if gh pr view "$branch_name" --json url >/dev/null 2>&1; then
            echo "Pull request already exists for $branch_name"
          else
            gh pr create \
              --base master \
              --head "$branch_name" \
              --title "AI: implement issue #${{ github.event.issue.number }}" \
              --body "AI implementation for issue #${{ github.event.issue.number }}"
          fi

