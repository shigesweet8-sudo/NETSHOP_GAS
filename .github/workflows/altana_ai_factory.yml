name: ALTANA AI FACTORY

on:
  issues:
    types: [opened]
  push:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Save Issue body
        run: echo "${{ github.event.issue.body }}" > issue_body.md

      - name: GPT Architect Layer (Issue Analysis)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request
          api_key = os.environ["OPENAI_API_KEY"]
          body = pathlib.Path("issue_body.md").read_text(encoding="utf-8")
          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": "You are an AI architect. Analyze the issue and respond with CODEX_INSTRUCTION: <instruction>."},
                  {"role": "user", "content": body}
              ]
          }
          req = urllib.request.Request("https://api.openai.com/v1/chat/completions", data=json.dumps(payload).encode("utf-8"), headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}, method="POST")
          with urllib.request.urlopen(req) as res:
              pathlib.Path("openai_response.json").write_text(res.read().decode("utf-8"), encoding="utf-8")
          PY

      - name: Extract Instruction
        run: |
          python - <<'PY'
          import json, pathlib, re
          data = json.loads(pathlib.Path("openai_response.json").read_text(encoding="utf-8"))
          content = data["choices"][0]["message"]["content"].strip()
          instruction = re.search(r"(?s)CODEX_INSTRUCTION:\s*(.*)$", content)
          pathlib.Path("codex_instruction.md").write_text((instruction.group(1) if instruction else content) + "\n", encoding="utf-8")
          PY

      - name: Codex Engineer Layer (Implementation)
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npm install -g @openai/codex
          cd "$GITHUB_WORKSPACE"
          codex exec workspace-write "$(cat codex_instruction.md)"

      - name: AI Review Layer (Diff Analysis)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git add -A
          git diff --cached > implementation.diff
          python - <<'PY'
          import json, os, pathlib, urllib.request
          api_key = os.environ["OPENAI_API_KEY"]
          diff = pathlib.Path("implementation.diff").read_text(encoding="utf-8")
          payload = {"model": "gpt-4o-mini", "messages": [{"role": "system", "content": "Review this git diff in Japanese."}, {"role": "user", "content": diff}]}
          req = urllib.request.Request("https://api.openai.com/v1/chat/completions", data=json.dumps(payload).encode("utf-8"), headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}, method="POST")
          with urllib.request.urlopen(req) as res:
              pathlib.Path("review_summary.txt").write_text(json.loads(res.read())["choices"][0]["message"]["content"], encoding="utf-8")
          PY

      - name: GitHub Actions Pipeline (Commit & PR)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "ALTANA-AI-BOT"
          git config user.email "ai@altana.dev"
          branch="feature/issue-${{ github.event.issue.number }}"
          git checkout -b "$branch"
          if ! git diff --cached --quiet; then
            git commit -m "AI: implement issue #${{ github.event.issue.number }}"
            git push origin "$branch"
            gh pr create --title "AI: implement issue #${{ github.event.issue.number }}" --body-file review_summary.txt --head "$branch" --base master || echo "PR exists"
          fi
