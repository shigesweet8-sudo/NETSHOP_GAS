<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WAVE</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --surface: #ffffff;
        --surface-soft: #f9fafb;
        --border: #e5e7eb;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --success: #166534;
        --success-soft: #dcfce7;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 180px);
        color: var(--text);
      }

      .layout-app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-title {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
      }

      .page-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .page-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }

      .card-title {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      }

      .btn:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
      }

      .btn-small {
        padding: 6px 10px;
        font-size: 12px;
      }

      .state-banner {
        display: none;
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .state-banner.is-visible {
        display: block;
      }

      .state-banner.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .state-banner.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .state-banner.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .status-line {
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--muted);
      }

      .items-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        align-items: center;
      }

      .toolbar-group {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .toolbar-spacer {
        flex: 1 1 auto;
      }

      .control-input,
      .control-select {
        height: 36px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        font: inherit;
        font-size: 13px;
        min-width: 120px;
        background: #fff;
      }

      .control-input {
        min-width: 220px;
      }

      .selected-count {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
      }

      .select-cell {
        width: 44px;
        text-align: center;
      }

      .action-cell {
        width: 84px;
        text-align: center;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 10px;
        font-size: 13px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f3f4f6;
        font-weight: 700;
      }

      tbody tr:nth-child(even) {
        background: var(--surface-soft);
      }

      .screen-hidden {
        display: none;
      }

      .detail-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: space-between;
        align-items: center;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .detail-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface-soft);
        padding: 10px;
      }

      .detail-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .detail-value {
        font-size: 14px;
        color: var(--text);
        word-break: break-word;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-field label {
        font-size: 13px;
        color: var(--muted);
      }

      .form-textarea {
        min-height: 88px;
        resize: vertical;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .inline-message {
        margin-top: 12px;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        display: none;
      }

      .inline-message.is-visible {
        display: block;
      }

      .inline-message.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .inline-message.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .inline-message.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
        }

        .page-actions {
          width: 100%;
        }

        .btn {
          width: 100%;
        }

        .items-toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-group {
          width: 100%;
        }

        .control-input,
        .control-select {
          width: 100%;
        }

        .toolbar-spacer {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout-app">
      <header class="page-header">
        <div>
          <h1 class="page-title">WAVE</h1>
          <p class="page-subtitle">商品一覧画面の正式実装に向けた UI 土台画面です。</p>
        </div>
        <div class="page-actions">
          <button id="open-create-item" class="btn btn-secondary" type="button">新規商品登録</button>
          <button id="reload-items" class="btn btn-primary" type="button">一覧を再取得</button>
        </div>
      </header>

      <div id="global-banner" class="state-banner" aria-live="polite"></div>

      <section id="list-section" class="card">
        <h2 class="card-title">商品一覧</h2>
        <div class="items-toolbar" id="items-toolbar">
          <div class="toolbar-group">
            <input id="keyword-search" class="control-input" type="search" placeholder="キーワード検索">
            <select id="status-filter" class="control-select" aria-label="ステータス絞り込み">
              <option value="">すべてのステータス</option>
            </select>
          </div>
          <div class="toolbar-group">
            <select id="sort-key" class="control-select" aria-label="並び替え項目">
              <option value="">並び替えなし</option>
            </select>
            <button id="sort-order-toggle" class="btn btn-secondary" type="button">昇順</button>
          </div>
          <div class="toolbar-group">
            <select id="bulk-action" class="control-select" aria-label="一括操作">
              <option value="">一括操作を選択</option>
              <option value="updateStatus">一括ステータス変更</option>
              <option value="recalculate">一括再計算</option>
              <option value="disable">一括無効化</option>
            </select>
            <select id="bulk-status" class="control-select" aria-label="変更後ステータス" style="display: none;">
              <option value="">変更後ステータス</option>
            </select>
            <button id="bulk-execute" class="btn btn-secondary" type="button">実行</button>
          </div>
          <div class="toolbar-spacer"></div>
          <div id="selected-count" class="selected-count">選択 0 件</div>
        </div>
        <div id="items-status" class="status-line">読み込み中...</div>
        <div id="content" class="muted">データを取得しています。</div>
      </section>

      <section id="detail-section" class="card screen-hidden" aria-live="polite">
        <div class="detail-header">
          <h2 class="card-title">商品詳細</h2>
          <div class="page-actions">
            <button id="open-edit-item" class="btn btn-primary" type="button">編集</button>
            <button id="back-to-list" class="btn btn-secondary" type="button">一覧へ戻る</button>
          </div>
        </div>
        <div id="detail-status" class="status-line">詳細を読み込みます。</div>
        <div id="detail-content" class="muted">対象商品を選択してください。</div>
      </section>

      <section id="create-section" class="card screen-hidden" aria-live="polite">
        <div class="detail-header">
          <h2 class="card-title">新規商品登録</h2>
          <button id="create-back-to-list" class="btn btn-secondary" type="button">一覧へ戻る</button>
        </div>
        <div class="form-grid">
          <div class="form-field">
            <label for="create-status">ステータス</label>
            <select id="create-status" class="control-select">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-field">
            <label for="create-shop">ショップ</label>
            <select id="create-shop" class="control-select">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-field">
            <label for="create-item-name">商品名</label>
            <input id="create-item-name" class="control-input" type="text" placeholder="商品名">
          </div>
          <div class="form-field">
            <label for="create-cost">仕入れ値</label>
            <input id="create-cost" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="create-price-final">決済金額</label>
            <input id="create-price-final" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="create-fee">サイト利用料</label>
            <input id="create-fee" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="create-shipping">配送料</label>
            <input id="create-shipping" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="create-memo">備考</label>
            <textarea id="create-memo" class="control-input form-textarea" placeholder="備考"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button id="create-save-item" class="btn btn-primary" type="button">保存</button>
          <button id="create-reset-form" class="btn btn-secondary" type="button">入力をクリア</button>
        </div>
        <div id="create-message" class="inline-message" aria-live="polite"></div>
      </section>

      <section id="edit-section" class="card screen-hidden" aria-live="polite">
        <div class="detail-header">
          <h2 class="card-title">商品編集</h2>
          <button id="edit-back-to-detail" class="btn btn-secondary" type="button">詳細へ戻る</button>
        </div>
        <div class="form-grid">
          <div class="form-field">
            <label for="edit-status">ステータス</label>
            <select id="edit-status" class="control-select">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-field">
            <label for="edit-shop">ショップ</label>
            <select id="edit-shop" class="control-select">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-field">
            <label for="edit-item-name">商品名</label>
            <input id="edit-item-name" class="control-input" type="text" placeholder="商品名">
          </div>
          <div class="form-field">
            <label for="edit-cost">仕入れ値</label>
            <input id="edit-cost" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-price-final">決済金額</label>
            <input id="edit-price-final" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-fee">サイト利用料</label>
            <input id="edit-fee" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-shipping">配送料</label>
            <input id="edit-shipping" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-memo">備考</label>
            <textarea id="edit-memo" class="control-input form-textarea" placeholder="備考"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button id="edit-save-item" class="btn btn-primary" type="button">保存</button>
          <button id="edit-reset-form" class="btn btn-secondary" type="button">初期値へ戻す</button>
        </div>
        <div id="edit-message" class="inline-message" aria-live="polite"></div>
      </section>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatStructuredValue(value) {
        if (value == null) return "";
        if (typeof value === "object") {
          try {
            return JSON.stringify(value);
          } catch (error) {
            return "[object]";
          }
        }
        return String(value);
      }

      function setBanner(kind, message) {
        var el = document.getElementById("global-banner");
        el.className = "state-banner";
        if (!message) {
          el.textContent = "";
          return;
        }
        el.classList.add("is-visible");
        el.classList.add(kind === "error" ? "is-error" : kind === "success" ? "is-success" : "is-info");
        el.textContent = message;
      }

      function normalizeExecutionError(err) {
        if (typeof err === "string") {
          return {
            type: "execution",
            message: err,
            raw: err
          };
        }
        if (err && typeof err === "object") {
          return {
            type: "execution",
            message: err.message || err.error || JSON.stringify(err),
            raw: err
          };
        }
        return {
          type: "execution",
          message: "Apps Script execution failed",
          raw: err
        };
      }

      function normalizeApiEnvelope(raw) {
        if (raw && typeof raw === "object" && typeof raw.ok === "boolean") {
          return raw;
        }

        return {
          ok: false,
          error: {
            message: "Unexpected API response format",
            code: "UNEXPECTED_API_RESPONSE",
            details: raw
          },
          data: null
        };
      }

      function resolveErrorMessage(error) {
        if (!error) return "不明なエラーです。";
        if (typeof error === "string") return error;
        if (error.message) return error.message;
        if (error.error && typeof error.error === "string") return error.error;
        if (error.error && error.error.message) return error.error.message;
        return "不明なエラーです。";
      }

      function toOptionObjects(list) {
        return (Array.isArray(list) ? list : []).map(function(entry) {
          if (entry && typeof entry === "object") {
            var value = entry.value != null ? String(entry.value) : "";
            var label = entry.label != null ? String(entry.label) : value;
            if (!value) return null;
            return { value: value, label: label };
          }
          var text = String(entry == null ? "" : entry).trim();
          if (!text) return null;
          return { value: text, label: text };
        }).filter(function(entry) {
          return !!entry;
        });
      }

      function extractMasterOptions(response, keys) {
        var data = response && response.data ? response.data : response;
        var masters = data && data.masters ? data.masters : (response && response.masters ? response.masters : {});
        if (!masters || typeof masters !== "object") return [];
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (!Object.prototype.hasOwnProperty.call(masters, key)) continue;
          var options = toOptionObjects(masters[key]);
          if (options.length) return options;
        }
        return [];
      }

      function runGasApi(apiName, args) {
        return new Promise(function(resolve, reject) {
          var runner = google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(function(err) {
              reject(normalizeExecutionError(err));
            });

          if (typeof runner[apiName] !== "function") {
            reject({
              type: "client",
              message: "Unknown Apps Script function: " + apiName,
              raw: apiName
            });
            return;
          }

          var callArgs = Array.isArray(args) ? args : [];
          runner[apiName].apply(runner, callArgs);
        });
      }

      function callWrappedApi(apiName, args) {
        return runGasApi(apiName, args).then(function(raw) {
          var response = normalizeApiEnvelope(raw);
          if (!response.ok) {
            throw {
              type: "api",
              message: resolveErrorMessage(response.error),
              response: response
            };
          }
          return response;
        });
      }

      function extractListItemsFromResponse(response) {
        if (!response || typeof response !== "object") return [];
        if (Array.isArray(response.data)) return response.data;
        if (response.data && Array.isArray(response.data.items)) return response.data.items;
        if (Array.isArray(response.items)) return response.items;
        return [];
      }

      var state = {
        allItems: [],
        viewItems: [],
        selectedById: {},
        sortKey: "",
        sortOrder: "asc",
        keyword: "",
        statusFilter: "",
        loading: false,
        viewMode: "list",
        detailItemId: "",
        detailLoading: false,
        detailItem: null,
        detailErrorMessage: "",
        editItemId: "",
        editInitialValues: null,
        editLoading: false,
        editSubmitting: false,
        createSubmitting: false,
        mastersLoaded: false,
        masterStatusOptions: [],
        masterShopOptions: []
      };

      function getCurrentHeaders(items) {
        if (!items || !items.length) return [];
        return Object.keys(items[0]);
      }

      function resolveItemId(item) {
        if (!item || typeof item !== "object") return "";
        if (item.id != null && String(item.id).trim() !== "") return String(item.id).trim();
        if (item["管理ID"] != null && String(item["管理ID"]).trim() !== "") return String(item["管理ID"]).trim();
        return "";
      }

      function buildSearchText(item) {
        return Object.keys(item || {}).map(function(key) {
          return formatStructuredValue(item[key]);
        }).join(" ").toLowerCase();
      }

      function applyClientFilters(items) {
        var keyword = String(state.keyword || "").trim().toLowerCase();
        var statusFilter = String(state.statusFilter || "").trim();
        return (items || []).filter(function(item) {
          if (statusFilter) {
            var itemStatus = item && item.status != null ? String(item.status) : "";
            if (itemStatus !== statusFilter) return false;
          }
          if (!keyword) return true;
          return buildSearchText(item).indexOf(keyword) !== -1;
        });
      }

      function pruneSelectionWithItems(items) {
        var validIdMap = {};
        (items || []).forEach(function(item) {
          var id = resolveItemId(item);
          if (id) validIdMap[id] = true;
        });
        Object.keys(state.selectedById).forEach(function(id) {
          if (!validIdMap[id]) delete state.selectedById[id];
        });
      }

      function getSelectedIds() {
        return Object.keys(state.selectedById).filter(function(id) {
          return !!state.selectedById[id];
        });
      }

      function updateSelectedCount() {
        document.getElementById("selected-count").textContent = "選択 " + getSelectedIds().length + " 件";
      }

      function updateToolbarOptions(items) {
        var list = items || [];
        var statusSelect = document.getElementById("status-filter");
        var bulkStatusSelect = document.getElementById("bulk-status");
        var sortKeySelect = document.getElementById("sort-key");
        var previousStatus = state.statusFilter;
        var previousBulkStatus = bulkStatusSelect.value;
        var previousSortKey = state.sortKey;
        var headers = getCurrentHeaders(list);
        var statusMap = {};

        list.forEach(function(item) {
          if (item && item.status != null && String(item.status).trim()) {
            statusMap[String(item.status)] = true;
          }
        });

        var statuses = Object.keys(statusMap).sort();
        statusSelect.innerHTML = "<option value=\"\">すべてのステータス</option>" + statuses.map(function(status) {
          return "<option value=\"" + escapeHtml(status) + "\">" + escapeHtml(status) + "</option>";
        }).join("");
        statusSelect.value = statuses.indexOf(previousStatus) !== -1 ? previousStatus : "";
        state.statusFilter = statusSelect.value;

        bulkStatusSelect.innerHTML = "<option value=\"\">変更後ステータス</option>" + statuses.map(function(status) {
          return "<option value=\"" + escapeHtml(status) + "\">" + escapeHtml(status) + "</option>";
        }).join("");
        bulkStatusSelect.value = statuses.indexOf(previousBulkStatus) !== -1 ? previousBulkStatus : "";

        sortKeySelect.innerHTML = "<option value=\"\">並び替えなし</option>" + headers.map(function(header) {
          return "<option value=\"" + escapeHtml(header) + "\">" + escapeHtml(header) + "</option>";
        }).join("");
        sortKeySelect.value = headers.indexOf(previousSortKey) !== -1 ? previousSortKey : "";
        state.sortKey = sortKeySelect.value;
      }

      function updateSelectAllState() {
        var selectAllEl = document.getElementById("select-all-rows");
        if (!selectAllEl) return;

        var selectableIds = state.viewItems.map(resolveItemId).filter(function(id) { return !!id; });
        var selectedVisibleCount = selectableIds.filter(function(id) {
          return !!state.selectedById[id];
        }).length;

        if (!selectableIds.length) {
          selectAllEl.checked = false;
          selectAllEl.indeterminate = false;
          return;
        }

        selectAllEl.checked = selectedVisibleCount === selectableIds.length;

      function populateCreateSelect(selectId, options, placeholder) {
        var select = document.getElementById(selectId);
        var previousValue = select.value || "";
        var list = toOptionObjects(options);
        select.innerHTML = "<option value=\"\">" + escapeHtml(placeholder || "選択してください") + "</option>" + list.map(function(option) {
          return "<option value=\"" + escapeHtml(option.value) + "\">" + escapeHtml(option.label) + "</option>";
        }).join("");
        select.value = list.some(function(option) { return option.value === previousValue; }) ? previousValue : "";
      }

      function ensureSelectHasValue(selectId, value, fallbackLabel) {
        var select = document.getElementById(selectId);
        if (!select) return;
        var text = String(value == null ? "" : value).trim();
        if (!text) {
          select.value = "";
          return;
        }
        var hasOption = Array.prototype.some.call(select.options, function(option) {
          return String(option.value) === text;
        });
        if (!hasOption) {
          var option = document.createElement("option");
          option.value = text;
          option.textContent = fallbackLabel || text;
          select.appendChild(option);
        }
        select.value = text;
      }

        state.masterStatusOptions = toOptionObjects(statusOptions);

        populateCreateSelect("create-shop", state.masterShopOptions, "ショップを選択");

        populateCreateSelect("edit-shop", state.masterShopOptions, "ショップを選択");

        return callWrappedApi("api_getMasters", [{

          var shopOptions = extractMasterOptions(response, ["shops", "shop", "ショップ"]);

          state.mastersLoaded = true;
          setInlineMessageById(messageId, "", "");
        }).catch(function(err) {
          applyMasterOptionsToForms([], []);

      function findFirstValue(item, keys) {
        if (!item || typeof item !== "object") return "";
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (!Object.prototype.hasOwnProperty.call(item, key)) continue;
          var value = item[key];
          if (value == null) continue;
          if (typeof value === "string" && value.trim() === "") continue;
          return value;
        }
        return "";
      }

      function toDisplayText(value) {
        var text = formatStructuredValue(value);
        return text === "" ? "-" : text;
      }

      function toDisplayMoney(value) {
        var text = formatStructuredValue(value);
        if (text === "") return "-";
        var normalized = text.replace(/,/g, "").trim();
        if (/^-?\d+(\.\d+)?$/.test(normalized)) {
          var num = Number(normalized);
          if (Number.isFinite(num)) {
            return num.toLocaleString("ja-JP");
          }
        }
        return text;
      }

      function renderDetailContent() {
        var statusEl = document.getElementById("detail-status");

        document.getElementById("open-edit-item").disabled = state.detailLoading || !state.detailItemId;

        if (state.detailLoading) {

        if (!state.detailItem || typeof state.detailItem !== "object") {
          statusEl.textContent = "詳細データなし";

        var item = state.detailItem;
        var fields = [
          { label: "管理ID", value: toDisplayText(findFirstValue(item, ["id", "管理ID"]) || state.detailItemId) },
          { label: "ステータス", value: toDisplayText(findFirstValue(item, ["status", "ステータス"])) },
          { label: "ショップ", value: toDisplayText(findFirstValue(item, ["shop", "ショップ"])) },
          { label: "商品名", value: toDisplayText(findFirstValue(item, ["itemName", "商品名"])) },

          { label: "交渉金額", value: toDisplayMoney(findFirstValue(item, ["negotiatedPrice", "交渉金額"])) },
          { label: "決済金額", value: toDisplayMoney(findFirstValue(item, ["priceFinal", "決済金額"])) },
          { label: "仕入れ値", value: toDisplayMoney(findFirstValue(item, ["cost", "仕入れ値"])) },
          { label: "配送料", value: toDisplayMoney(findFirstValue(item, ["shipping", "配送料"])) },
          { label: "サイト利用料", value: toDisplayMoney(findFirstValue(item, ["fee", "サイト利用料"])) },
          { label: "粗利", value: toDisplayMoney(findFirstValue(item, ["profit", "粗利(原価引)"])) },
          { label: "備考", value: toDisplayText(findFirstValue(item, ["memo", "備考"])) }
        ];

        var html = "<div class=\"detail-grid\">" + fields.map(function(field) {

        }).join("") + "</div>";

      function getItemFieldText(item, keys) {

      function openEditScreen(itemId) {
        var normalizedId = String(itemId || state.detailItemId || "").trim();
        if (!normalizedId) {
          setBanner("error", "管理IDを特定できないため編集画面を開けません。");
          return;
        }

        state.editItemId = normalizedId;
        state.editInitialValues = null;
        setEditInlineMessage("", "");
        switchScreen("edit");
        setEditLoading(true);
        setEditInlineMessage("info", "編集データを取得しています...");

        var mastersPromise = loadCreateMastersIfNeeded(false, "edit-message").catch(function() {
          return null;
        });
        var detailPromise = callWrappedApi("getItem", [normalizedId]).then(function(response) {
          var item = response && response.data ? response.data : null;
          if (!item) {
            throw new Error("編集対象データが見つかりません。");
          }
          setEditFormValues(item);
        });

        Promise.all([mastersPromise, detailPromise]).then(function() {
          resetEditFormToInitial();
        }).catch(function(err) {
          setEditInlineMessage("error", "編集データの取得に失敗しました: " + resolveErrorMessage(err));
          setBanner("error", "編集画面の初期化に失敗しました。");
        }).finally(function() {
          setEditLoading(false);
        });
      }

      function saveEditedItem() {
        if (state.editSubmitting || state.editLoading) return;
        var itemId = String(state.editItemId || "").trim();
        if (!itemId) {
          setEditInlineMessage("error", "管理IDが取得できないため保存できません。");
          return;
        }

        setEditSubmitting(true);
        setEditInlineMessage("info", "保存しています...");
        var payload = collectEditPayload();

        callWrappedApi("api_updateItem", [itemId, payload]).then(function() {
          setEditInlineMessage("success", "保存に成功しました。");
          setBanner("success", "商品を更新しました。");
          openDetailById(itemId, { silentSuccessBanner: true });
        }).catch(function(err) {
          setEditInlineMessage("error", "保存に失敗しました: " + resolveErrorMessage(err));
          setBanner("error", "商品の更新に失敗しました。");
        }).finally(function() {
          setEditSubmitting(false);
        });
      }

      function openDetailById(itemId, options) {
        var opts = options && typeof options === "object" ? options : {};
        var normalizedId = String(itemId || "").trim();
        if (!normalizedId) {
          setBanner("error", "管理IDを特定できないため詳細を開けません。");
          return Promise.resolve();
        }

        state.detailItemId = normalizedId;
        state.detailLoading = true;
        state.detailItem = null;
        state.detailErrorMessage = "";
        switchScreen("detail");
        renderDetailContent();

        return callWrappedApi("getItem", [normalizedId]).then(function(response) {
          state.detailItem = response && response.data ? response.data : null;
          state.detailErrorMessage = "";
          if (!opts.silentSuccessBanner) {
            setBanner("info", "商品詳細を表示しました。");
          }
        }).catch(function(err) {
          state.detailItem = null;
          state.detailErrorMessage = resolveErrorMessage(err);
          setBanner("error", "商品詳細の取得に失敗しました: " + resolveErrorMessage(err));
        }).finally(function() {
          state.detailLoading = false;
          renderDetailContent();

      function renderItemsTable(items) {
        state.viewItems = items || [];
        if (!state.viewItems.length) {
          document.getElementById("items-status").textContent = "データなし";
          document.getElementById("content").innerHTML = "<span class=\"muted\">表示できるデータがありません。</span>";
          updateSelectedCount();
          updateBulkUiState();
          return;
        }

        var headers = getCurrentHeaders(state.viewItems);
        var html = "<div class=\"table-wrap\"><table><thead><tr>";
        html += "<th class=\"select-cell\"><input id=\"select-all-rows\" type=\"checkbox\" aria-label=\"全選択\"></th>";
        html += "<th class=\"action-cell\">詳細</th>";
        headers.forEach(function(header) {
          html += "<th>" + escapeHtml(header) + "</th>";
        });
        html += "</tr></thead><tbody>";

        state.viewItems.forEach(function(item) {
          var itemId = resolveItemId(item);
          var checked = itemId && state.selectedById[itemId] ? " checked" : "";
          var disabled = itemId ? "" : " disabled";
          html += "<tr>";
          html += "<td class=\"select-cell\"><input class=\"row-select\" type=\"checkbox\" data-item-id=\"" + escapeHtml(itemId) + "\"" + checked + disabled + " aria-label=\"行選択\"></td>";
          html += "<td class=\"action-cell\"><button class=\"btn btn-secondary btn-small row-detail-open\" type=\"button\" data-item-id=\"" + escapeHtml(itemId) + "\"" + disabled + ">詳細</button></td>";
          headers.forEach(function(header) {
            html += "<td>" + escapeHtml(formatStructuredValue(item[header])) + "</td>";
          });
          html += "</tr>";
        });

        html += "</tbody></table></div>";
        document.getElementById("items-status").textContent = "読み込み完了 " + state.viewItems.length + " 件";
        document.getElementById("content").innerHTML = html;
        updateSelectAllState();
        updateSelectedCount();
        updateBulkUiState();

        document.getElementById("sort-order-toggle").disabled = !!flag;

      function loadItemsWithCurrentSort(options) {
        var opts = options || {};
        var useSort = !opts.forceBaseLoad && !!state.sortKey;
        setLoading(true, "読み込み中...");
        var promise;
        if (useSort) {
          promise = callWrappedApi("api_listItemsSorted", [{
            sortKey: state.sortKey,
            order: state.sortOrder
          }]);
        } else {
          promise = callWrappedApi("api_listItems");
        }

        return promise.then(function(response) {
          state.allItems = extractListItemsFromResponse(response);
          state.selectedById = {};
          updateToolbarOptions(state.allItems);
          applyAndRenderCurrentView();
          setBanner("success", "商品一覧を取得しました。");

          document.getElementById("items-status").textContent = "エラー";
          document.getElementById("content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(err)) + "</span>";
          setBanner("error", "商品一覧の取得に失敗しました。");
        }).finally(function() {
          setLoading(false);
        });
      }

      function executeBulkAction() {
        var selectedIds = getSelectedIds();
        var action = document.getElementById("bulk-action").value;
        var statusValue = document.getElementById("bulk-status").value;

        if (!selectedIds.length) {
          setBanner("error", "一括操作する行を選択してください。");
          updateBulkUiState();
          return;
        }
        if (!action) {
          setBanner("error", "一括操作を選択してください。");
          return;
        }
        if (action === "updateStatus" && !statusValue) {
          setBanner("error", "変更後ステータスを選択してください。");
          return;
        }

        var actionLabel = action === "updateStatus"
          ? "一括ステータス変更"
          : action === "recalculate"
            ? "一括再計算"
            : "一括無効化";
        if (!window.confirm(actionLabel + "を " + selectedIds.length + " 件に実行します。よろしいですか？")) {
          return;
        }

        setLoading(true, "一括処理中...");
        setBanner("info", actionLabel + "を実行しています。");

        var apiName = "";
        var payload = { itemIds: selectedIds };
        if (action === "updateStatus") {
          apiName = "api_bulkUpdateStatus";
          payload.status = statusValue;
        } else if (action === "recalculate") {
          apiName = "api_bulkRecalculateProfit";
        } else {
          apiName = "api_bulkDisableNetshop";
        }

        callWrappedApi(apiName, [payload]).then(function() {
          setBanner("success", actionLabel + "が完了しました。");
          return loadItemsWithCurrentSort({ forceBaseLoad: false });
        }).catch(function(err) {
          setBanner("error", actionLabel + "に失敗しました: " + resolveErrorMessage(err));
        }).finally(function() {
          setLoading(false);
          updateBulkUiState();
        });
      }

        openDetailById(state.editItemId, { silentSuccessBanner: true });
      });

      document.getElementById("edit-save-item").addEventListener("click", function() {
        saveEditedItem();
      });

      document.getElementById("edit-reset-form").addEventListener("click", function() {
        resetEditFormToInitial();
        setEditInlineMessage("", "");
      });

      document.getElementById("content").addEventListener("change", function(event) {
        var target = event.target;
        if (!target) return;

        if (target.id === "select-all-rows") {
          var checked = !!target.checked;
          state.viewItems.forEach(function(item) {
            var itemId = resolveItemId(item);
            if (!itemId) return;
            state.selectedById[itemId] = checked;
          });
          renderItemsTable(state.viewItems);
          return;
        }

        if (target.classList.contains("row-select")) {
          var itemId = target.getAttribute("data-item-id");
          if (itemId) {
            state.selectedById[itemId] = !!target.checked;
          }
          updateSelectAllState();
          updateSelectedCount();
          updateBulkUiState();
        }
      });

      document.getElementById("content").addEventListener("click", function(event) {
        var target = event.target;
        if (!target) return;
        if (target.classList.contains("row-detail-open")) {
          var itemId = target.getAttribute("data-item-id");
          openDetailById(itemId);
        }
      });

      updateBulkUiState();
      switchScreen("list");
      loadItemsWithCurrentSort({ forceBaseLoad: true });
    </script>
  </body>
</html>
