<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WAVE</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --surface: #ffffff;
        --surface-soft: #f9fafb;
        --border: #e5e7eb;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --success: #166534;
        --success-soft: #dcfce7;
        --warning: #9a3412;
        --warning-soft: #ffedd5;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 180px);
        color: var(--text);
      }

      .layout-app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-title {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
      }

      .page-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .page-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .screen-context {
        margin-bottom: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        background: var(--surface);
        font-size: 13px;
        color: var(--muted);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }

      .card-title {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      }

      .btn:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
      }

      .btn-small {
        padding: 6px 10px;
        font-size: 12px;
      }

      .state-banner {
        display: none;
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .state-banner.is-visible {
        display: block;
      }

      .state-banner.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .state-banner.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .state-banner.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .status-line {
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--muted);
      }

      .items-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        align-items: center;
      }

      .toolbar-group {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .toolbar-spacer {
        flex: 1 1 auto;
      }

      .control-input,
      .control-select {
        height: 36px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        font: inherit;
        font-size: 13px;
        min-width: 120px;
        background: #fff;
      }

      .control-input {
        min-width: 220px;
      }

      .selected-count {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
      }

      .select-cell {
        width: 44px;
        text-align: center;
      }

      .action-cell {
        width: 84px;
        text-align: center;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 10px;
        font-size: 13px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f3f4f6;
        font-weight: 700;
      }

      tbody tr:nth-child(even) {
        background: var(--surface-soft);
      }

      .screen-hidden {
        display: none;
      }

      .detail-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: space-between;
        align-items: center;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .detail-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface-soft);
        padding: 10px;
      }

      .detail-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .detail-value {
        font-size: 14px;
        color: var(--text);
        word-break: break-word;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-field label {
        font-size: 13px;
        color: var(--muted);
      }

      .field-inline-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .field-inline-actions .control-input {
        flex: 1 1 auto;
        min-width: 0;
      }

      .field-inline-actions .btn {
        width: auto;
        white-space: nowrap;
      }

      .validation-result {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        display: none;
      }

      .validation-result.is-visible {
        display: block;
      }

      .validation-section + .validation-section {
        margin-top: 10px;
      }

      .validation-title {
        margin: 0 0 6px;
        font-size: 13px;
        font-weight: 700;
      }

      .validation-title.is-error {
        color: var(--danger);
      }

      .validation-title.is-warning {
        color: var(--warning);
      }

      .validation-list {
        margin: 0;
        padding-left: 18px;
      }

      .validation-list li {
        font-size: 12px;
        line-height: 1.5;
      }

      .validation-empty {
        margin: 0;
        font-size: 13px;
        color: var(--success);
      }

      .form-textarea {
        min-height: 88px;
        resize: vertical;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .inline-message {
        margin-top: 12px;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        display: none;
      }

      .inline-message.is-visible {
        display: block;
      }

      .inline-message.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .inline-message.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .inline-message.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .dashboard-block {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        background: var(--surface-soft);
      }

      .dashboard-title {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }

      .kpi-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }

      .kpi-label {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .kpi-value {
        margin: 4px 0 0;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
        }

        .page-actions {
          width: 100%;
        }

        .btn {
          width: 100%;
        }

        .items-toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-group {
          width: 100%;
        }

        .control-input,
        .control-select {
          width: 100%;
        }

        .toolbar-spacer {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout-app">
      <header class="page-header">
        <div>
          <h1 class="page-title">WAVE</h1>
          <p class="page-subtitle">商品一覧画面の正式実装に向けた UI 土台画面です。</p>
        </div>
        <div class="page-actions">
          <button id="open-list" class="btn btn-secondary" type="button">一覧へ</button>
          <button id="open-dashboard" class="btn btn-secondary" type="button">ダッシュボード</button>
          <button id="open-create-item" class="btn btn-secondary" type="button">新規商品登録</button>
          <button id="reload-items" class="btn btn-primary" type="button">一覧を再取得</button>
        </div>
      </header>

      <div id="global-banner" class="state-banner" aria-live="polite"></div>
      <div id="screen-context" class="screen-context" aria-live="polite"></div>

      <section id="list-section" class="card">
        <h2 class="card-title">商品一覧</h2>
        <div class="items-toolbar" id="items-toolbar">
          <div class="toolbar-group">
            <input id="keyword-search" class="control-input" type="search" placeholder="キーワード検索">
            <select id="status-filter" class="control-select" aria-label="ステータス絞り込み">
              <option value="">すべてのステータス</option>
            </select>
          </div>
          <div class="toolbar-group">
            <select id="sort-key" class="control-select" aria-label="並び替え項目">
              <option value="">並び替えなし</option>
            </select>
            <button id="sort-order-toggle" class="btn btn-secondary" type="button">昇順</button>
          </div>
          <div class="toolbar-group">
            <select id="bulk-action" class="control-select" aria-label="一括操作">
              <option value="">一括操作を選択</option>
              <option value="updateStatus">一括ステータス変更</option>
              <option value="recalculate">一括再計算</option>
              <option value="disable">一括無効化</option>
            </select>
            <select id="bulk-status" class="control-select" aria-label="変更後ステータス" style="display: none;">
              <option value="">変更後ステータス</option>
            </select>
            <button id="bulk-execute" class="btn btn-secondary" type="button">実行</button>
          </div>
          <div class="toolbar-spacer"></div>
          <div id="selected-count" class="selected-count">選択 0 件</div>
        </div>
        <div id="items-status" class="status-line">読み込み中...</div>
        <div id="content" class="muted">データを取得しています。</div>
      </section>

      <section id="dashboard-section" class="card screen-hidden" aria-live="polite">
        <div class="detail-header">
          <h2 class="card-title">ダッシュボード</h2>
          <div class="page-actions">
            <button id="dashboard-reload" class="btn btn-primary" type="button">再取得</button>
            <button id="dashboard-back-to-list" class="btn btn-secondary" type="button">一覧へ戻る</button>
          </div>
        </div>
        <div class="dashboard-grid">
          <div class="dashboard-block">
            <h3 class="dashboard-title">KPI</h3>
            <div id="dashboard-kpi-status" class="status-line">データを取得しています。</div>
            <div id="dashboard-kpi-content" class="muted">読み込み中...</div>
          </div>
          <div class="dashboard-block">
            <h3 class="dashboard-title">月別集計</h3>
            <div id="dashboard-monthly-status" class="status-line">データを取得しています。</div>
            <div id="dashboard-monthly-content" class="muted">読み込み中...</div>
          </div>
          <div class="dashboard-block">
            <h3 class="dashboard-title">プラットフォーム別集計</h3>
            <div id="dashboard-platform-status" class="status-line">データを取得しています。</div>
            <div id="dashboard-platform-content" class="muted">読み込み中...</div>
          </div>
        </div>
      </section>

      <section id="detail-section" class="card screen-hidden" aria-live="polite">
        <div class="detail-header">
          <h2 class="card-title">商品詳細</h2>
          <div class="page-actions">
            <button id="open-edit-item" class="btn btn-primary" type="button">編集</button>
            <button id="back-to-list" class="btn btn-secondary" type="button">一覧へ戻る</button>
          </div>
        </div>
        <div id="detail-status" class="status-line">詳細を読み込みます。</div>
        <div id="detail-content" class="muted">対象商品を選択してください。</div>
      </section>

      <section id="create-section" class="card screen-hidden" aria-live="polite">
        <div class="detail-header">
          <h2 class="card-title">新規商品登録</h2>
          <button id="create-back-to-list" class="btn btn-secondary" type="button">一覧へ戻る</button>

          <button id="create-save-item" class="btn btn-primary" type="button">保存</button>

      <section id="edit-section" class="card screen-hidden" aria-live="polite">
        <div class="detail-header">
          <h2 class="card-title">商品編集</h2>
          <button id="edit-back-to-detail" class="btn btn-secondary" type="button">詳細へ戻る</button>
        </div>
        <div class="form-grid">
          <div class="form-field">
            <label for="edit-status">ステータス</label>
            <select id="edit-status" class="control-select">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-field">
            <label for="edit-shop">ショップ</label>
            <select id="edit-shop" class="control-select">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-field">
            <label for="edit-item-name">商品名</label>
            <input id="edit-item-name" class="control-input" type="text" placeholder="商品名">
          </div>
          <div class="form-field">
            <label for="edit-cost">仕入れ値</label>
            <input id="edit-cost" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-price-final">決済金額</label>
            <input id="edit-price-final" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-fee">サイト利用料</label>
            <input id="edit-fee" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-shipping">配送料</label>
            <input id="edit-shipping" class="control-input" type="text" inputmode="decimal" placeholder="0">
          </div>
          <div class="form-field">
            <label for="edit-zip">郵便番号</label>
            <div class="field-inline-actions">
              <input id="edit-zip" class="control-input" type="text" inputmode="numeric" placeholder="1234567">
              <button id="edit-lookup-zip" class="btn btn-secondary btn-small" type="button">住所補完</button>
            </div>
          </div>
          <div class="form-field">
            <label for="edit-pref">都道府県</label>
            <input id="edit-pref" class="control-input" type="text" placeholder="都道府県">
          </div>
          <div class="form-field">
            <label for="edit-addr2">住所2(地番)</label>
            <input id="edit-addr2" class="control-input" type="text" placeholder="市区町村・地番">
          </div>
          <div class="form-field">

            <input id="edit-addr3" class="control-input" type="text" placeholder="建物名など">

            <label for="edit-memo">備考</label>

          </div>
        </div>

          <button id="edit-reset-form" class="btn btn-secondary" type="button">初期値へ戻す</button>
        </div>
        <div id="edit-validation-result" class="validation-result" aria-live="polite"></div>
        <div id="edit-message" class="inline-message" aria-live="polite"></div>
      </section>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatStructuredValue(value) {
        if (value == null) return "";
        if (typeof value === "object") {
          try {
            return JSON.stringify(value);
          } catch (error) {
            return "[object]";
          }
        }
        return String(value);
      }

      function setBanner(kind, message) {
        var el = document.getElementById("global-banner");
        el.className = "state-banner";
        if (!message) {
          el.textContent = "";
          return;
        }
        el.classList.add("is-visible");
        el.classList.add(kind === "error" ? "is-error" : kind === "success" ? "is-success" : "is-info");
        el.textContent = message;
      }

      function normalizeExecutionError(err) {
        if (typeof err === "string") {
          return {
            type: "execution",
            message: err,
            raw: err
          };
        }
        if (err && typeof err === "object") {
          return {
            type: "execution",
            message: err.message || err.error || JSON.stringify(err),
            raw: err
          };
        }
        return {
          type: "execution",
          message: "Apps Script execution failed",
          raw: err
        };
      }

      function normalizeApiEnvelope(raw) {
        if (raw && typeof raw === "object" && typeof raw.ok === "boolean") {
          return raw;
        }

        return {
          ok: false,
          error: {
            message: "Unexpected API response format",
            code: "UNEXPECTED_API_RESPONSE",
            details: raw
          },
          data: null
        };
      }

      function resolveErrorMessage(error) {
        if (!error) return "不明なエラーです。";
        if (typeof error === "string") return error;
        if (error.message) return error.message;
        if (error.error && typeof error.error === "string") return error.error;

      function parseRouteFromParams(params) {

      function parseRouteFromHash(hash) {
        var raw = String(hash || "").replace(/^#/, "").trim();
        if (!raw) return null;
        if (raw.charAt(0) === "/") raw = raw.slice(1);

        if (raw.indexOf("=") === -1) {
          var modeOnly = normalizeRouteMode(raw.split(":")[0]);

          if ((modeOnly === "detail" || modeOnly === "edit") && !simpleId) modeOnly = "list";
          return { mode: modeOnly, id: simpleId };
        }

        return parseRouteFromParams(new URLSearchParams(raw));

      function parseRouteFromSearch(search) {

        return { mode: "list", id: "" };

      function getCurrentRouteState() {

          id = normalizeRouteId(state.editItemId || state.detailItemId);

      function buildHashFromRoute(route) {

      function isSameRoute(routeA, routeB) {

      function syncUrlWithState(options) {
        var opts = options && typeof options === "object" ? options : {};

      function getCurrentHeaders(items) {

      function normalizeValidationIssues(list) {

            var code = entry.code != null ? String(entry.code).trim() : "";
            var field = entry.field != null ? String(entry.field).trim() : "";

            var text = message;
            if (!text) text = formatStructuredValue(entry);
            if (!text) text = "Issue " + (index + 1);

          source = response.error.details;

          errors: errors,
          warnings: warnings

      function renderValidationResult(formType, result) {
        var el = document.getElementById(getValidationResultElementId(formType));

        var warnings = result && Array.isArray(result.warnings) ? result.warnings : [];

        var html = "";

          errors.forEach(function(issue) {
            var parts = [];
            if (issue.code) parts.push("[" + issue.code + "]");
            if (issue.field) parts.push(issue.field + ":");
            parts.push(issue.message || "");
            html += "<li>" + escapeHtml(parts.join(" ").trim()) + "</li>";
          });
          html += "</ul></div>";
        }
        if (warnings.length) {
          html += "<div class=\"validation-section\"><p class=\"validation-title is-warning\">Warnings (" + warnings.length + ")</p><ul class=\"validation-list\">";
          warnings.forEach(function(issue) {

      function runSavePreValidation(formType) {
        var isEdit = formType === "edit";
        if (isEdit && (state.editLoading || state.editSubmitting)) return;

        var messageSetter = isEdit ? setEditInlineMessage : setInlineMessage;
        var itemPayload = isEdit ? collectEditPayload() : collectCreatePayload();
        var requestPayload = {
          mode: isEdit ? "update" : "create",
          item: itemPayload

        if (isEdit) {
          requestPayload.item.id = String(state.editItemId || "").trim();
        }

        messageSetter("info", "保存前バリデーションを実行しています...");
        clearValidationResult(formType);

        runVariationValidation(requestPayload).then(function(response) {
          var parsed = extractValidationResult(response);
          renderValidationResult(formType, parsed);

          if (parsed.errors.length) {
            messageSetter("error", "Errors が見つかりました。内容を修正してから保存してください。");
          } else if (parsed.warnings.length) {
            messageSetter("info", "Warnings のみです。内容を確認したうえで保存できます。");
          } else {
            messageSetter("success", "保存前バリデーションで問題は見つかりませんでした。");

      function populateCreateSelect(selectId, options, placeholder) {
        var select = document.getElementById(selectId);
        var previousValue = select.value || "";
        var list = toOptionObjects(options);
        select.innerHTML = "<option value=\"\">" + escapeHtml(placeholder || "選択してください") + "</option>" + list.map(function(option) {
          return "<option value=\"" + escapeHtml(option.value) + "\">" + escapeHtml(option.label) + "</option>";
        }).join("");
        select.value = list.some(function(option) { return option.value === previousValue; }) ? previousValue : "";
      }

      function ensureSelectHasValue(selectId, value, fallbackLabel) {
        var select = document.getElementById(selectId);
        if (!select) return;
        var text = String(value == null ? "" : value).trim();
        if (!text) {
          select.value = "";
          return;
        }
        var hasOption = Array.prototype.some.call(select.options, function(option) {
          return String(option.value) === text;
        });
        if (!hasOption) {
          var option = document.createElement("option");
          option.value = text;
          option.textContent = fallbackLabel || text;
          select.appendChild(option);
        }
        select.value = text;
      }

        state.masterStatusOptions = toOptionObjects(statusOptions);
        state.masterShopOptions = toOptionObjects(shopOptions);
        populateCreateSelect("create-status", state.masterStatusOptions, "ステータスを選択");
        populateCreateSelect("create-shop", state.masterShopOptions, "ショップを選択");

        populateCreateSelect("edit-shop", state.masterShopOptions, "ショップを選択");

          return Promise.resolve();

        setInlineMessageById(messageId, "info", "候補を取得しています...");
        return callWrappedApi("api_getMasters", [{

        }).catch(function(err) {

      function findFirstValue(item, keys) {
        if (!item || typeof item !== "object") return "";
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (!Object.prototype.hasOwnProperty.call(item, key)) continue;
          var value = item[key];
          if (value == null) continue;
          if (typeof value === "string" && value.trim() === "") continue;
          return value;
        }
        return "";
      }

      function toDisplayText(value) {
        var text = formatStructuredValue(value);
        return text === "" ? "-" : text;
      }

      function toDisplayMoney(value) {
        var text = formatStructuredValue(value);
        if (text === "") return "-";
        var normalized = text.replace(/,/g, "").trim();
        if (/^-?\d+(\.\d+)?$/.test(normalized)) {
          var num = Number(normalized);
          if (Number.isFinite(num)) {
            return num.toLocaleString("ja-JP");
          }
        }
        return text;
      }

      function extractArrayData(response, candidateKeys) {
        if (!response || typeof response !== "object") return [];
        var data = response.data != null ? response.data : response;
        if (Array.isArray(data)) return data;
        if (!data || typeof data !== "object") return [];

        var keys = Array.isArray(candidateKeys) ? candidateKeys : [];
        for (var i = 0; i < keys.length; i++) {
          if (Array.isArray(data[keys[i]])) return data[keys[i]];
        }
        return [];
      }

      function getTableHeaders(rows) {
        if (!Array.isArray(rows) || !rows.length) return [];
        var firstRow = rows[0];
        if (!firstRow || typeof firstRow !== "object" || Array.isArray(firstRow)) return ["値"];
        return Object.keys(firstRow);
      }

      function buildSimpleTableHtml(rows) {
        var list = Array.isArray(rows) ? rows : [];
        if (!list.length) {
          return "<span class=\"muted\">表示できるデータがありません。</span>";
        }

        var headers = getTableHeaders(list);
        var html = "<div class=\"table-wrap\"><table><thead><tr>";
        headers.forEach(function(header) {
          html += "<th>" + escapeHtml(header) + "</th>";
        });
        html += "</tr></thead><tbody>";

        list.forEach(function(row) {
          html += "<tr>";
          if (!row || typeof row !== "object" || Array.isArray(row)) {
            html += "<td>" + escapeHtml(formatStructuredValue(row)) + "</td>";
          } else {
            headers.forEach(function(header) {
              html += "<td>" + escapeHtml(formatStructuredValue(row[header])) + "</td>";
            });
          }
          html += "</tr>";
        });
        html += "</tbody></table></div>";
        return html;
      }

      function formatKpiValue(key, value) {
        var text = formatStructuredValue(value);
        if (text === "") return "-";

        var normalized = text.replace(/,/g, "").trim();
        if (/^-?\d+(\.\d+)?$/.test(normalized)) {
          var num = Number(normalized);
          if (Number.isFinite(num)) {
            if (/rate|率/i.test(String(key || ""))) return num.toFixed(1) + "%";
            return num.toLocaleString("ja-JP");
          }
        }
        return text;
      }

      function renderDashboardKpi(kpi) {
        var statusEl = document.getElementById("dashboard-kpi-status");
        var contentEl = document.getElementById("dashboard-kpi-content");

        if (!kpi || typeof kpi !== "object" || Array.isArray(kpi) || !Object.keys(kpi).length) {
          statusEl.textContent = "データなし";
          contentEl.innerHTML = "<span class=\"muted\">表示できるデータがありません。</span>";
          return;
        }

        var html = "<div class=\"kpi-grid\">" + Object.keys(kpi).map(function(key) {
          return "<div class=\"kpi-card\"><p class=\"kpi-label\">" + escapeHtml(key) + "</p><p class=\"kpi-value\">" + escapeHtml(formatKpiValue(key, kpi[key])) + "</p></div>";
        }).join("") + "</div>";
        statusEl.textContent = "読み込み完了 " + Object.keys(kpi).length + " 件";
        contentEl.innerHTML = html;
      }

      function renderDashboardTable(statusId, contentId, rows) {

        statusEl.textContent = "読み込み完了 " + list.length + " 件";

      function loadDashboard() {
        setDashboardLoading(true);
        setBanner("info", "ダッシュボードを取得しています。");
        document.getElementById("dashboard-kpi-status").textContent = "読み込み中...";
        document.getElementById("dashboard-monthly-status").textContent = "読み込み中...";
        document.getElementById("dashboard-platform-status").textContent = "読み込み中...";
        document.getElementById("dashboard-kpi-content").innerHTML = "<span class=\"muted\">データを取得しています。</span>";
        document.getElementById("dashboard-monthly-content").innerHTML = "<span class=\"muted\">データを取得しています。</span>";
        document.getElementById("dashboard-platform-content").innerHTML = "<span class=\"muted\">データを取得しています。</span>";

        return Promise.allSettled([
          callWrappedApi("api_uiDashboardKpi"),
          callWrappedApi("api_getMonthlySummary"),
          callWrappedApi("api_getPlatformSummary")
        ]).then(function(results) {
          var kpiResult = results[0];
          var monthlyResult = results[1];
          var platformResult = results[2];
          var failedCount = 0;

          if (kpiResult.status === "fulfilled") {
            renderDashboardKpi(kpiResult.value && kpiResult.value.data ? kpiResult.value.data : null);
          } else {
            failedCount++;
            document.getElementById("dashboard-kpi-status").textContent = "取得失敗";
            document.getElementById("dashboard-kpi-content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(kpiResult.reason)) + "</span>";
          }

          if (monthlyResult.status === "fulfilled") {
            renderDashboardTable(
              "dashboard-monthly-status",
              "dashboard-monthly-content",
              extractArrayData(monthlyResult.value, ["monthly", "items"])
            );
          } else {
            failedCount++;
            document.getElementById("dashboard-monthly-status").textContent = "取得失敗";
            document.getElementById("dashboard-monthly-content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(monthlyResult.reason)) + "</span>";
          }

          if (platformResult.status === "fulfilled") {
            renderDashboardTable(
              "dashboard-platform-status",
              "dashboard-platform-content",
              extractArrayData(platformResult.value, ["platforms", "items"])
            );
          } else {
            failedCount++;
            document.getElementById("dashboard-platform-status").textContent = "取得失敗";
            document.getElementById("dashboard-platform-content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(platformResult.reason)) + "</span>";
          }

          if (failedCount === 0) {
            setBanner("success", "ダッシュボードを取得しました。");
          } else if (failedCount < 3) {
            setBanner("error", "ダッシュボードの一部取得に失敗しました。");
          } else {
            setBanner("error", "ダッシュボードの取得に失敗しました。");
          }
        }).catch(function(err) {
          setBanner("error", "ダッシュボードの取得に失敗しました: " + resolveErrorMessage(err));
        }).finally(function() {
          setDashboardLoading(false);
        });
      }

      function buildEditUpdatePayload() {
        var current = collectEditPayload();
        var initial = state.editInitialValues || {};
        var payload = {};
        Object.keys(current).forEach(function(key) {
          var currentValue = String(current[key] || "").trim();
          var initialValue = String(initial[key] || "").trim();
          if (currentValue !== initialValue) {
            payload[key] = currentValue;
          }
        });
        return payload;
      }

      function openEditScreen(itemId, options) {
        var opts = options && typeof options === "object" ? options : {};

          if (opts.fromRouteRestore) {
            setBanner("error", "編集対象を復元できないため一覧へ戻りました。");
            switchScreen("list");
          } else {
            setBanner("error", "管理IDを特定できないため編集画面を開けません。");
          }
          return;
        }

        state.editItemId = normalizedId;
        state.detailItemId = normalizedId;
        state.editInitialValues = null;
        setEditInlineMessage("", "");
        clearValidationResult("edit");
        switchScreen("edit");
        setEditLoading(true);
        setEditInlineMessage("info", "編集データを取得しています...");

        var mastersPromise = loadCreateMastersIfNeeded(false, "edit-message").catch(function() {
          return null;

        var detailPromise = callWrappedApi("getItem", [normalizedId]).then(function(response) {
          var item = response && response.data ? response.data : null;
          if (!item) {
            throw new Error("編集対象データが見つかりません。");
          }
          setEditFormValues(item);
        });

        Promise.all([mastersPromise, detailPromise]).then(function() {
          resetEditFormToInitial();
        }).catch(function(err) {
          if (opts.fromRouteRestore) {
            setBanner("error", "編集画面を復元できないため一覧へ戻りました。");
            switchScreen("list");

            setEditInlineMessage("error", "編集データの取得に失敗しました: " + resolveErrorMessage(err));
            setBanner("error", "編集画面の初期化に失敗しました。");

          setEditLoading(false);

          setEditInlineMessage("error", "管理IDが取得できないため保存できません。");
          return;

        if (!state.editInitialValues) {
          setEditInlineMessage("error", "初期データが未取得のため保存できません。");
          return;
        }

        setEditSubmitting(true);
        setEditInlineMessage("info", "保存しています...");
        var payload = buildEditUpdatePayload();
        if (!Object.keys(payload).length) {
          setEditInlineMessage("info", "変更がないため保存は不要です。");
          setEditSubmitting(false);
          return;
        }

        callWrappedApi("api_updateItem", [itemId, payload]).then(function() {
          setEditInlineMessage("success", "保存に成功しました。");
          setBanner("success", "商品を更新しました。");

        if (!normalizedId) {
          if (opts.fromRouteRestore) {
            setBanner("error", "詳細対象を復元できないため一覧へ戻りました。");
            switchScreen("list");
          } else {
            setBanner("error", "管理IDを特定できないため詳細を開けません。");
          }
          return Promise.resolve();
        }

        state.detailItemId = normalizedId;
        state.detailLoading = true;
        state.detailItem = null;
        state.detailErrorMessage = "";
        switchScreen("detail");
        renderDetailContent();

        return callWrappedApi("getItem", [normalizedId]).then(function(response) {
          state.detailItem = response && response.data ? response.data : null;
          state.detailErrorMessage = state.detailItem ? "" : "対象データが見つかりません。";
          if (!state.detailItem && opts.fromRouteRestore) {
            setBanner("error", "詳細対象を復元できないため一覧へ戻りました。");
            switchScreen("list");
            return;
          }
          if (!opts.silentSuccessBanner) {
            if (state.detailItem) {
              setBanner("info", "商品詳細を表示しました。");
            } else {
              setBanner("error", "対象データが見つかりませんでした。");
            }
          }
        }).catch(function(err) {
          state.detailItem = null;
          state.detailErrorMessage = resolveErrorMessage(err);
          if (opts.fromRouteRestore) {
            setBanner("error", "詳細画面を復元できないため一覧へ戻りました。");
            switchScreen("list");
          } else {
            setBanner("error", "商品詳細の取得に失敗しました: " + resolveErrorMessage(err));
          }
        }).finally(function() {
          state.detailLoading = false;
          renderDetailContent();
        });
      }

      function renderItemsTable(items) {
        state.viewItems = items || [];
        if (!state.viewItems.length) {
          document.getElementById("items-status").textContent = "データなし";
          document.getElementById("content").innerHTML = "<span class=\"muted\">表示できるデータがありません。</span>";
          updateSelectedCount();
          updateBulkUiState();
          return;
        }

        var headers = getCurrentHeaders(state.viewItems);
        var html = "<div class=\"table-wrap\"><table><thead><tr>";
        html += "<th class=\"select-cell\"><input id=\"select-all-rows\" type=\"checkbox\" aria-label=\"全選択\"></th>";
        html += "<th class=\"action-cell\">詳細</th>";
        headers.forEach(function(header) {
          html += "<th>" + escapeHtml(header) + "</th>";
        });
        html += "</tr></thead><tbody>";

        state.viewItems.forEach(function(item) {
          var itemId = resolveItemId(item);
          var checked = itemId && state.selectedById[itemId] ? " checked" : "";
          var disabled = itemId && !state.loading ? "" : " disabled";
          html += "<tr>";
          html += "<td class=\"select-cell\"><input class=\"row-select\" type=\"checkbox\" data-item-id=\"" + escapeHtml(itemId) + "\"" + checked + disabled + " aria-label=\"行選択\"></td>";
          html += "<td class=\"action-cell\"><button class=\"btn btn-secondary btn-small row-detail-open\" type=\"button\" data-item-id=\"" + escapeHtml(itemId) + "\"" + disabled + ">詳細</button></td>";
          headers.forEach(function(header) {
            html += "<td>" + escapeHtml(formatStructuredValue(item[header])) + "</td>";
          });
          html += "</tr>";
        });

        html += "</tbody></table></div>";
        document.getElementById("items-status").textContent = "読み込み完了 " + state.viewItems.length + " 件";
        document.getElementById("content").innerHTML = html;
        updateSelectAllState();
        updateSelectedCount();
        updateBulkUiState();
      }

      function applyAndRenderCurrentView() {
        pruneSelectionWithItems(state.allItems);
        renderItemsTable(applyClientFilters(state.allItems));
      }

      function setLoading(flag, message) {
        state.loading = !!flag;
        document.getElementById("reload-items").disabled = !!flag;
        document.getElementById("open-dashboard").disabled = !!flag;
        document.getElementById("open-create-item").disabled = !!flag;
        document.getElementById("open-list").disabled = !!flag || state.viewMode === "list";
        document.getElementById("sort-order-toggle").disabled = !!flag;
        document.getElementById("keyword-search").disabled = !!flag;
        document.getElementById("status-filter").disabled = !!flag;
        document.getElementById("sort-key").disabled = !!flag;
        if (message) {
          document.getElementById("items-status").textContent = message;
        }
        updateBulkUiState();
        refreshGlobalActionState();
      }

      function loadItemsWithCurrentSort(options) {
        var opts = options || {};
        var useSort = !opts.forceBaseLoad && !!state.sortKey;
        setLoading(true, "読み込み中...");
        var promise;
        if (useSort) {
          promise = callWrappedApi("api_listItemsSorted", [{
            sortKey: state.sortKey,
            order: state.sortOrder
          }]);
        } else {
          promise = callWrappedApi("api_listItems");
        }

        return promise.then(function(response) {
          state.allItems = extractListItemsFromResponse(response);
          state.selectedById = {};
          updateToolbarOptions(state.allItems);
          applyAndRenderCurrentView();
          setBanner("success", "商品一覧を取得しました。");
        }).catch(function(err) {
          document.getElementById("items-status").textContent = "エラー";
          document.getElementById("content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(err)) + "</span>";
          setBanner("error", "商品一覧の取得に失敗しました。");
        }).finally(function() {
          setLoading(false);
        });
      }

      function executeBulkAction() {
        if (state.loading) return;
        var selectedIds = getSelectedIds();
        var action = document.getElementById("bulk-action").value;
        var statusValue = document.getElementById("bulk-status").value;

        if (!selectedIds.length) {
          setBanner("error", "一括操作する行を選択してください。");
          updateBulkUiState();
          return;
        }
        if (!action) {
          setBanner("error", "一括操作を選択してください。");
          return;
        }
        if (action === "updateStatus" && !statusValue) {
          setBanner("error", "変更後ステータスを選択してください。");
          return;
        }

        var confirmInfo = buildBulkConfirmMessage(action, selectedIds.length, statusValue);
        if (!confirmAction(confirmInfo.message)) {
          return;
        }

        setLoading(true, "一括処理中...");
        setBanner("info", confirmInfo.label + "を実行しています。");

        var apiName = "";
        var payload = { itemIds: selectedIds };
        if (action === "updateStatus") {
          apiName = "api_bulkUpdateStatus";
          payload.status = statusValue;
        } else if (action === "recalculate") {
          apiName = "api_bulkRecalculateProfit";
        } else {
          apiName = "api_bulkDisableNetshop";
        }

        callWrappedApi(apiName, [payload]).then(function() {
          setBanner("success", confirmInfo.label + "が完了しました。");
          return loadItemsWithCurrentSort({ forceBaseLoad: false });
        }).catch(function(err) {
          setBanner("error", confirmInfo.label + "に失敗しました: " + resolveErrorMessage(err));
        }).finally(function() {
          setLoading(false);
          updateBulkUiState();
        });
      }

      document.getElementById("reload-items").addEventListener("click", function() {
        if (isAnyBusy()) return;
        setBanner("info", "商品一覧を再取得しています。");
        loadItemsWithCurrentSort({ forceBaseLoad: true });
      });

      document.getElementById("open-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        if (!confirmNavigationIfNeeded("list")) return;
        switchScreen("list");
      });

      document.getElementById("open-create-item").addEventListener("click", function() {
        openCreateScreen();
      });

      document.getElementById("open-dashboard").addEventListener("click", function() {
        openDashboardScreen();
      });

      document.getElementById("dashboard-back-to-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        if (!confirmNavigationIfNeeded("list")) return;
        switchScreen("list");
      });

      document.getElementById("dashboard-reload").addEventListener("click", function() {
        if (isAnyBusy()) return;
        loadDashboard();
      });

      document.getElementById("keyword-search").addEventListener("input", function(event) {
        state.keyword = event.target.value || "";
        applyAndRenderCurrentView();
      });

      document.getElementById("status-filter").addEventListener("change", function(event) {
        state.statusFilter = event.target.value || "";
        applyAndRenderCurrentView();
      });

      document.getElementById("sort-key").addEventListener("change", function(event) {
        state.sortKey = event.target.value || "";
        if (!state.sortKey) {
          applyAndRenderCurrentView();
          return;
        }
        setBanner("info", "並び替えで再取得しています。");
        loadItemsWithCurrentSort({ forceBaseLoad: false });
      });

      document.getElementById("sort-order-toggle").addEventListener("click", function() {
        state.sortOrder = state.sortOrder === "asc" ? "desc" : "asc";
        this.textContent = state.sortOrder === "asc" ? "昇順" : "降順";
        if (!state.sortKey) return;
        setBanner("info", "並び順を変更して再取得しています。");
        loadItemsWithCurrentSort({ forceBaseLoad: false });
      });

      document.getElementById("bulk-action").addEventListener("change", function() {
        updateBulkUiState();
      });

      document.getElementById("bulk-execute").addEventListener("click", function() {
        executeBulkAction();
      });

      document.getElementById("back-to-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        switchScreen("list");
      });

      document.getElementById("open-edit-item").addEventListener("click", function() {
        openEditScreen(state.detailItemId);
      });

      document.getElementById("create-back-to-list").addEventListener("click", function() {
        if (isAnyBusy()) return;
        if (!confirmNavigationIfNeeded("list")) return;
        switchScreen("list");
      });

      document.getElementById("create-save-item").addEventListener("click", function() {
        saveNewItem();
      });

      document.getElementById("create-validate-item").addEventListener("click", function() {
        runSavePreValidation("create");
      });

      document.getElementById("create-lookup-zip").addEventListener("click", function() {
        lookupZipForForm("create");
      });

      document.getElementById("create-reset-form").addEventListener("click", function() {
        if (state.createSubmitting) return;
        if (hasCreateFormChanges() && !confirmAction("入力内容をクリアします。よろしいですか？")) return;
        resetCreateForm();
        setInlineMessage("", "");
      });

      document.getElementById("edit-back-to-detail").addEventListener("click", function() {
        if (state.editSubmitting || state.editLoading) return;
        if (hasEditUnsavedChanges() && !confirmAction("編集内容を破棄して詳細へ戻ります。よろしいですか？")) return;
        if (!state.editItemId) {
          switchScreen("list");
          return;
        }
        openDetailById(state.editItemId, { silentSuccessBanner: true });
      });

      document.getElementById("edit-save-item").addEventListener("click", function() {
        saveEditedItem();
      });

      document.getElementById("edit-validate-item").addEventListener("click", function() {
        runSavePreValidation("edit");
      });

      document.getElementById("edit-lookup-zip").addEventListener("click", function() {
        lookupZipForForm("edit");
      });

      document.getElementById("edit-reset-form").addEventListener("click", function() {
        if (state.editSubmitting || state.editLoading) return;
        if (hasEditUnsavedChanges() && !confirmAction("編集内容を初期値に戻します。よろしいですか？")) return;
        resetEditFormToInitial();
        setEditInlineMessage("", "");
      });

      document.getElementById("content").addEventListener("change", function(event) {
        if (state.loading) return;
        var target = event.target;
        if (!target) return;

        if (target.id === "select-all-rows") {
          var checked = !!target.checked;
          state.viewItems.forEach(function(item) {
            var itemId = resolveItemId(item);
            if (!itemId) return;
            state.selectedById[itemId] = checked;
          });
          renderItemsTable(state.viewItems);
          return;
        }

        if (target.classList.contains("row-select")) {
          var itemId = target.getAttribute("data-item-id");
          if (itemId) {
            state.selectedById[itemId] = !!target.checked;
          }
          updateSelectAllState();
          updateSelectedCount();
          updateBulkUiState();
        }
      });

      document.getElementById("content").addEventListener("click", function(event) {
        if (state.loading) return;
        var target = event.target;
        if (!target) return;
        if (target.classList.contains("row-detail-open")) {
          var itemId = target.getAttribute("data-item-id");
          openDetailById(itemId);
        }
      });

      window.addEventListener("hashchange", function() {
        if (state.routeSyncLock) {
          state.routeSyncLock = false;
          return;
        }

        var targetRoute = resolveRouteFromUrl();
        var currentRoute = getCurrentRouteState();
        if (isSameRoute(targetRoute, currentRoute)) return;

        restoreRoute(targetRoute, { skipConfirm: false });
      });

      updateBulkUiState();
      restoreRoute(resolveRouteFromUrl(), { skipConfirm: true });
    </script>
  </body>
</html>
