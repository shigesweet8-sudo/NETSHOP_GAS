<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WAVE</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --surface: #ffffff;
        --surface-soft: #f9fafb;
        --border: #e5e7eb;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --success: #166534;
        --success-soft: #dcfce7;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 180px);
        color: var(--text);
      }

      .layout-app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-title {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
      }

      .page-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .page-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }

      .card-title {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      }

      .btn:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
      }

      .state-banner {
        display: none;
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .state-banner.is-visible {
        display: block;
      }

      .state-banner.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .state-banner.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .state-banner.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .status-line {
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--muted);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 10px;
        font-size: 13px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f3f4f6;
        font-weight: 700;
      }

      tbody tr:nth-child(even) {
        background: var(--surface-soft);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
        }

        .page-actions {
          width: 100%;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout-app">
      <header class="page-header">
        <div>
          <h1 class="page-title">WAVE</h1>
          <p class="page-subtitle">一覧 UI の土台を確認するためのローカル最適化画面です。</p>
        </div>
        <div class="page-actions">
          <button id="reload-debug" class="btn btn-secondary" type="button">コンテキスト再取得</button>
          <button id="reload-items" class="btn btn-primary" type="button">一覧を再取得</button>
        </div>
      </header>

      <div id="global-banner" class="state-banner" aria-live="polite"></div>

      <section class="card">
        <h2 class="card-title">確認用コンテキスト</h2>
        <div id="debug-status" class="status-line">確認中...</div>
        <div id="debug-context" class="muted">データを取得しています。</div>
      </section>

      <section class="card">
        <h2 class="card-title">商品一覧</h2>
        <div id="items-status" class="status-line">読み込み中...</div>
        <div id="content" class="muted">データを取得しています。</div>
      </section>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatStructuredValue(value) {
        if (value == null) return "";
        if (typeof value === "object") {
          try {
            return JSON.stringify(value);
          } catch (error) {
            return "[object]";
          }
        }
        return String(value);
      }

      function setBanner(kind, message) {
        var el = document.getElementById("global-banner");
        el.className = "state-banner";
        if (!message) {
          el.textContent = "";
          return;
        }
        el.classList.add("is-visible");
        el.classList.add(kind === "error" ? "is-error" : kind === "success" ? "is-success" : "is-info");
        el.textContent = message;
      }

      function renderStructuredData(targetId, value) {
        document.getElementById(targetId).innerHTML = "<pre>" + escapeHtml(JSON.stringify(value, null, 2)) + "</pre>";
      }

      function normalizeExecutionError(err) {
        if (typeof err === "string") {
          return {
            type: "execution",
            message: err,
            raw: err
          };
        }
        if (err && typeof err === "object") {
          return {
            type: "execution",
            message: err.message || err.error || JSON.stringify(err),
            raw: err
          };
        }
        return {
          type: "execution",
          message: "Apps Script execution failed",
          raw: err
        };
      }

      function normalizeApiEnvelope(raw, options) {
        var settings = options || {};
        var allowLegacyRaw = !!settings.allowLegacyRaw;

        if (raw && typeof raw === "object" && typeof raw.ok === "boolean") {
          return raw;
        }

        if (allowLegacyRaw) {
          return {
            ok: true,
            error: null,
            data: raw
          };
        }

        return {
          ok: false,
          error: {
            message: "Unexpected API response format",
            code: "UNEXPECTED_API_RESPONSE",
            details: raw
          },
          data: null
        };
      }

      function resolveErrorMessage(error) {
        if (!error) return "不明なエラーです。";
        if (typeof error === "string") return error;
        if (error.message) return error.message;
        if (error.error && typeof error.error === "string") return error.error;
        if (error.error && error.error.message) return error.error.message;
        return "不明なエラーです。";
      }

      function runGasApi(apiName, args) {
        return new Promise(function(resolve, reject) {
          var runner = google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(function(err) {
              reject(normalizeExecutionError(err));
            });

          if (typeof runner[apiName] !== "function") {
            reject({
              type: "client",
              message: "Unknown Apps Script function: " + apiName,
              raw: apiName
            });
            return;
          }

          var callArgs = Array.isArray(args) ? args : [];
          runner[apiName].apply(runner, callArgs);
        });
      }

      function callWrappedApi(apiName, args) {
        return runGasApi(apiName, args).then(function(raw) {
          var response = normalizeApiEnvelope(raw, { allowLegacyRaw: false });
          if (!response.ok) {
            throw {
              type: "api",
              message: resolveErrorMessage(response.error),
              response: response
            };
          }
          return response;
        });
      }

      function callLegacyApi(apiName, args) {
        return runGasApi(apiName, args).then(function(raw) {
          return normalizeApiEnvelope(raw, { allowLegacyRaw: true });
        });
      }

      function renderItemsTable(items) {
        if (!items || !items.length) {
          document.getElementById("items-status").textContent = "データなし";
          document.getElementById("content").innerHTML = "<span class=\"muted\">表示できるデータがありません。</span>";
          return;
        }

        var headers = Object.keys(items[0]);
        var html = "<div class=\"table-wrap\"><table><thead><tr>";
        headers.forEach(function(header) {
          html += "<th>" + escapeHtml(header) + "</th>";
        });
        html += "</tr></thead><tbody>";

        items.forEach(function(item) {
          html += "<tr>";
          headers.forEach(function(header) {
            html += "<td>" + escapeHtml(formatStructuredValue(item[header])) + "</td>";
          });
          html += "</tr>";
        });

        html += "</tbody></table></div>";
        document.getElementById("items-status").textContent = "読み込み完了";
        document.getElementById("content").innerHTML = html;
      }

      function loadDebugContext() {
        document.getElementById("debug-status").textContent = "確認中...";
        return callLegacyApi("api_debugContext").then(function(response) {
          document.getElementById("debug-status").textContent = "確認完了";
          renderStructuredData("debug-context", response.data);
        }).catch(function(err) {
          document.getElementById("debug-status").textContent = "エラー";
          document.getElementById("debug-context").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(err)) + "</span>";
          setBanner("error", "確認用コンテキストの取得に失敗しました。");
        });
      }

      function loadItems() {
        document.getElementById("items-status").textContent = "読み込み中...";
        return callWrappedApi("api_listItems").then(function(response) {
          var items = Array.isArray(response.data) ? response.data : Array.isArray(response.items) ? response.items : [];
          renderItemsTable(items);
          setBanner("success", "商品一覧を取得しました。");
        }).catch(function(err) {
          document.getElementById("items-status").textContent = "エラー";
          document.getElementById("content").innerHTML = "<span class=\"muted\">" + escapeHtml(resolveErrorMessage(err)) + "</span>";
          setBanner("error", "商品一覧の取得に失敗しました。");
        });
      }

      document.getElementById("reload-debug").addEventListener("click", function() {
        setBanner("info", "確認用コンテキストを再取得しています。");
        loadDebugContext();
      });

      document.getElementById("reload-items").addEventListener("click", function() {
        setBanner("info", "商品一覧を再取得しています。");
        loadItems();
      });

      loadDebugContext();
      loadItems();
    </script>
  </body>
</html>
