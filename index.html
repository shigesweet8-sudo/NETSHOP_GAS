<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WAVE</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --surface: #ffffff;
        --surface-soft: #f9fafb;
        --border: #e5e7eb;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --success: #166534;
        --success-soft: #dcfce7;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 180px);
        color: var(--text);
      }

      .layout-app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-title {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
      }

      .page-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .page-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }

      .card-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }

      .list-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        margin-bottom: 10px;
      }

      .list-description {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .list-toolbar {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }

      .count-chip {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface-soft);
        color: var(--text);
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      }

      .btn:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
      }

      .state-banner {
        display: none;
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .state-banner.is-visible {
        display: block;
      }

      .state-banner.is-success {
        background: var(--success-soft);
        color: var(--success);
      }

      .state-banner.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .state-banner.is-info {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .status-line {
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--muted);
      }

      .table-empty {
        padding: 16px;
        border: 1px dashed var(--border);
        border-radius: 10px;
        color: var(--muted);
        background: var(--surface-soft);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 10px;
        font-size: 13px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f3f4f6;
        font-weight: 700;
      }

      tbody tr:nth-child(even) {
        background: var(--surface-soft);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
        }

        .page-actions {
          width: 100%;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout-app">
      <header class="page-header">
        <div>
          <h1 class="page-title">WAVE</h1>
          <p class="page-subtitle">商品一覧</p>
        </div>
      </header>

      <div id="global-banner" class="state-banner" aria-live="polite"></div>

      <section class="card">
        <div class="list-header">
          <div>
            <h2 class="card-title">商品一覧</h2>
            <p class="list-description">検索・並び替え・一括操作の拡張を見据えた一覧表示エリアです。</p>
          </div>
        </div>
        <div class="list-toolbar">
          <div id="items-count" class="count-chip">0 件</div>
          <div class="page-actions">
            <button id="reload-items" class="btn btn-primary" type="button">再取得</button>
          </div>
        </div>
        <div id="items-status" class="status-line">読み込み中...</div>
        <div id="items-table-region" class="muted">データを取得しています。</div>
      </section>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatStructuredValue(value) {
        if (value == null) return "";
        if (typeof value === "object") {
          try {
            return JSON.stringify(value);
          } catch (error) {
            return "[object]";
          }
        }
        return String(value);
      }

      function setBanner(kind, message) {
        var el = document.getElementById("global-banner");
        el.className = "state-banner";
        if (!message) {
          el.textContent = "";
          return;
        }
        el.classList.add("is-visible");
        el.classList.add(kind === "error" ? "is-error" : kind === "success" ? "is-success" : "is-info");
        el.textContent = message;
      }

      function normalizeExecutionError(err) {
        if (typeof err === "string") {
          return {
            type: "execution",
            message: err,
            raw: err
          };
        }
        if (err && typeof err === "object") {
          return {
            type: "execution",
            message: err.message || err.error || JSON.stringify(err),
            raw: err
          };
        }
        return {
          type: "execution",
          message: "Apps Script execution failed",
          raw: err
        };
      }

      function normalizeApiEnvelope(raw) {
        if (raw && typeof raw === "object" && typeof raw.ok === "boolean") {
          return raw;
        }

        return {
          ok: false,
          error: {
            message: "Unexpected API response format",
            code: "UNEXPECTED_API_RESPONSE",
            details: raw
          },
          data: null
        };
      }

      function resolveErrorMessage(error) {
        if (!error) return "不明なエラーです。";
        if (typeof error === "string") return error;
        if (error.message) return error.message;
        if (error.error && typeof error.error === "string") return error.error;
        if (error.error && error.error.message) return error.error.message;
        return "不明なエラーです。";
      }

      function runGasApi(apiName, args) {
        return new Promise(function(resolve, reject) {
          var runner = google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(function(err) {
              reject(normalizeExecutionError(err));
            });

          if (typeof runner[apiName] !== "function") {
            reject({
              type: "client",
              message: "Unknown Apps Script function: " + apiName,
              raw: apiName
            });
            return;
          }

          var callArgs = Array.isArray(args) ? args : [];
          runner[apiName].apply(runner, callArgs);
        });
      }

      function callWrappedApi(apiName, args) {
        return runGasApi(apiName, args).then(function(raw) {
          var response = normalizeApiEnvelope(raw);
          if (!response.ok) {
            throw {
              type: "api",
              message: resolveErrorMessage(response.error),
              response: response
            };
          }
          return response;
        });
      }

      function extractListItemsFromResponse(response) {
        if (!response || typeof response !== "object") return [];
        if (Array.isArray(response.data)) return response.data;
        if (response.data && Array.isArray(response.data.items)) return response.data.items;
        if (Array.isArray(response.items)) return response.items;
        return [];
      }

      var LIST_COLUMNS = [
        { key: "status", label: "ステータス" },
        { key: "id", label: "管理ID" },
        { key: "date", label: "日にち" },
        { key: "shop", label: "ショップ" },
        { key: "itemName", label: "商品名" },
        { key: "qty", label: "個数" },
        { key: "cost", label: "仕入れ値" },
        { key: "priceFinal", label: "決済金額" },
        { key: "profit", label: "粗利(原価引)" },
        { key: "memo", label: "備考" }
      ];

      function toItemArray(rawItems) {
        if (!Array.isArray(rawItems)) return [];
        return rawItems.filter(function(item) {
          return item && typeof item === "object" && !Array.isArray(item);
        });
      }

      function updateItemsCount(count) {
        document.getElementById("items-count").textContent = count + " 件";
      }

      function renderItemsTable(items) {
        var normalizedItems = toItemArray(items);
        var regionEl = document.getElementById("items-table-region");
        updateItemsCount(normalizedItems.length);

        if (!normalizedItems.length) {
          document.getElementById("items-status").textContent = "データなし";
          regionEl.innerHTML = "<div class=\"table-empty\">表示できる商品データがありません。</div>";
          return;
        }

        var headers = LIST_COLUMNS.filter(function(column) {
          return normalizedItems.some(function(item) {
            return Object.prototype.hasOwnProperty.call(item, column.key);
          });
        });

        if (!headers.length) {
          headers = Object.keys(normalizedItems[0]).map(function(key) {
            return { key: key, label: key };
          });
        }

        var html = "<div class=\"table-wrap\"><table><thead><tr>";
        headers.forEach(function(header) {
          html += "<th>" + escapeHtml(header.label) + "</th>";
        });
        html += "</tr></thead><tbody>";

        normalizedItems.forEach(function(item) {
          html += "<tr>";
          headers.forEach(function(header) {
            html += "<td>" + escapeHtml(formatStructuredValue(item[header.key])) + "</td>";
          });
          html += "</tr>";
        });

        html += "</tbody></table></div>";
        document.getElementById("items-status").textContent = "読み込み完了";
        regionEl.innerHTML = html;
      }

      function loadItems() {
        document.getElementById("items-status").textContent = "読み込み中...";
        document.getElementById("items-table-region").innerHTML = "<span class=\"muted\">データを取得しています。</span>";
        updateItemsCount(0);
        return callWrappedApi("api_listItems").then(function(response) {
          var items = extractListItemsFromResponse(response);
          renderItemsTable(items);
          setBanner("success", "商品一覧を取得しました。");
        }).catch(function(err) {
          document.getElementById("items-status").textContent = "エラー";
          document.getElementById("items-table-region").innerHTML = "<div class=\"table-empty\">" + escapeHtml(resolveErrorMessage(err)) + "</div>";
          updateItemsCount(0);
          setBanner("error", "商品一覧の取得に失敗しました。");
        });
      }

      document.getElementById("reload-items").addEventListener("click", function() {
        setBanner("info", "商品一覧を再取得しています。");
        loadItems();
      });

      loadItems();
    </script>
  </body>
</html>
