<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WAVE</title>
    <style>
      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: #f7f9fc;
        color: #1f2937;
      }
      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
      }
      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }
      .form-row input {
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
      }
      .btn {
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-bottom: 12px;
        font-size: 14px;
        color: #4b5563;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #e5e7eb;
        padding: 8px;
        font-size: 13px;
        text-align: left;
      }
      th {
        background: #f3f4f6;
        font-weight: 700;
      }
      tbody tr:nth-child(even) {
        background: #fafafa;
      }
      .muted {
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>WAVE</h1>
      <div class="card">
        <div class="form-row">
          <input id="itemName" type="text" placeholder="商品名" required>
          <input id="cost" type="number" placeholder="仕入額" min="0">
          <input id="qty" type="number" placeholder="数量" min="1" value="1">
          <input id="listPrice" type="number" placeholder="出品価格" min="0">
          <button id="createBtn" type="button" class="btn">商品登録</button>
          <button id="registerButton" type="button" class="btn">登録</button>
        </div>
        <div id="status" class="status">読み込み中...</div>
        <div id="content" class="muted">データを取得しています。</div>
      </div>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function render(items) {
        if (!Array.isArray(items) || items.length === 0) {
          document.getElementById("status").textContent = "データなし";
          document.getElementById("content").innerHTML = "<span class=\"muted\">表示できるデータがありません。</span>";
          return;
        }

        var html = "";
        for (var i = 0; i < items.length; i++) {
          html += "<pre>" + escapeHtml(JSON.stringify(items[i])) + "</pre>";
        }

        document.getElementById("status").textContent = "読み込み完了";
        document.getElementById("content").innerHTML = html;
      }

      function showError(message) {
        document.getElementById("status").textContent = "エラー";
        document.getElementById("content").innerHTML = "<span class=\"muted\">" + escapeHtml(message) + "</span>";
      }

      function fetchItems() {
        google.script.run
          .withSuccessHandler(function(items) {
            console.log("api_listItems result:", items);
            render(items);
          })
          .withFailureHandler(function(err) {
            showError((err && err.message) ? err.message : "データ取得に失敗しました。");
          })
          .api_listItems();
      }

      function createItem() {
        var button = document.getElementById("createBtn");
        var itemName = document.getElementById("itemName").value.trim();
        var cost = document.getElementById("cost").value;
        var qty = document.getElementById("qty").value;
        var listPrice = document.getElementById("listPrice").value;

        if (!itemName) {
          showError("商品名を入力してください。");
          return;
        }

        button.disabled = true;
        document.getElementById("status").textContent = "登録中...";

        google.script.run
          .withSuccessHandler(function(result) {
            button.disabled = false;
            if (!result || !result.ok) {
              showError((result && result.error) ? result.error : "商品登録に失敗しました。");
              return;
            }
            fetchItems();
          })
          .withFailureHandler(function(err) {
            button.disabled = false;
            showError((err && err.message) ? err.message : "商品登録に失敗しました。");
          })
          .api_createItem({
            itemName: itemName,
            cost: cost ? Number(cost) : "",
            qty: qty ? Number(qty) : 1,
            listPrice: listPrice ? Number(listPrice) : ""
          });
      }

      function registerItem() {
        var button = document.getElementById("registerButton");
        var payload = { key: "固定値" };

        button.disabled = true;
        document.getElementById("status").textContent = "登録中...";

        google.script.run
          .withSuccessHandler(function(result) {
            button.disabled = false;
            if (!result || !result.ok) {
              showError((result && result.error) ? result.error : "商品登録に失敗しました。");
              return;
            }
            fetchItems();
          })
          .withFailureHandler(function(err) {
            button.disabled = false;
            showError((err && err.message) ? err.message : "商品登録に失敗しました。");
          })
          .api_createItem(payload);
      }

      document.getElementById("createBtn").addEventListener("click", createItem);
      document.getElementById("registerButton").addEventListener("click", registerItem);
      fetchItems();
    </script>
  </body>
</html>
